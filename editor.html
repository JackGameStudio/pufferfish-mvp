<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弹弹河豚 - 关卡编辑器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  /* 工具栏 */
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    background: #222; border-bottom: 2px solid #0af;
    display: flex; align-items: center; padding: 0 10px; gap: 4px; z-index: 10;
  }
  .toolbar-group { display: flex; gap: 4px; align-items: center; }
  .toolbar-sep { width: 1px; height: 28px; background: #555; margin: 0 6px; }
  .tool-btn {
    padding: 5px 10px; background: #333; color: #ccc; border: 1px solid #555;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .tool-btn:hover { background: #444; color: #fff; }
  .tool-btn.active { background: #0af; color: #000; border-color: #0af; font-weight: bold; }
  .tool-btn.danger { background: #a22; color: #fff; border-color: #a22; }
  .tool-btn.primary { background: #0a6; color: #fff; border-color: #0a6; }
  /* 模态框 */
  #modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; justify-content: center; align-items: center;
  }
  #modal.show { display: flex; }
  #modal-content {
    background: #222; border: 2px solid #0af; border-radius: 8px;
    padding: 20px; min-width: 500px; max-width: 700px; color: #fff;
  }
  #modal-content h3 { margin-bottom: 12px; color: #0af; }
  #export-code {
    width: 100%; height: 300px; background: #111; color: #0f0;
    border: 1px solid #444; border-radius: 4px; font-family: monospace;
    font-size: 12px; padding: 8px; resize: none;
  }
  #modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="toolbar">
  <div class="toolbar-group">
    <button class="tool-btn active" id="btn-select" data-tool="select">🖱️ 选择</button>
    <button class="tool-btn" id="btn-circle" data-tool="circle">🔴 圆形</button>
    <button class="tool-btn" id="btn-rect" data-tool="rect">🟦 方块</button>
    <button class="tool-btn" id="btn-start" data-tool="start">🟢 起点</button>
    <button class="tool-btn" id="btn-end" data-tool="end">🔵 终点</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tool-btn" id="btn-undo">↩️ 撤销</button>
    <button class="tool-btn" id="btn-redo">↪️ 重做</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tool-btn primary" id="btn-play">▶️ 试玩</button>
    <button class="tool-btn" id="btn-export">📋 导出</button>
    <button class="tool-btn" id="btn-load">📂 加载</button>
  </div>
</div>
<div id="modal">
  <div id="modal-content">
    <h3>复制关卡代码</h3>
    <textarea id="export-code" readonly></textarea>
    <div id="modal-actions">
      <button class="tool-btn" id="modal-close">关闭</button>
    </div>
  </div>
</div>
<script>
// === 状态 ===
const state = {
  worldWidth: 2200,
  worldHeight: 750,
  fishScale: 1.0,
  objects: [],
  history: [],
  historyIndex: -1,
  mode: 'edit',       // 'edit' | 'play'
  selectedId: null,
  activeTool: 'select',
  viewOffset: { x: 1100, y: 375 },  // 居中
  viewScale: 1.0,
  dragState: null,
  nextId: 1,
  // 试玩模式
  playFish: null,
  playInput: null,
  playCamera: null,
};
// === 入口 ===
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
// === 坐标转换 ===
// 将屏幕坐标转换为世界坐标
function screenToWorld(sx, sy) {
  return {
    x: (sx - viewOffset.x) / viewScale + state.worldWidth / 2,
    y: (sy - viewOffset.y) / viewScale + state.worldHeight / 2
  };
}

// === 绘制网格 ===
function drawGrid() {
  const gridSize = 50;
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  // 只画可见区域内的线
  const startX = -viewOffset.x * viewScale;
  const startY = -viewOffset.y * viewScale;
  const endX = startX + canvas.width;
  const endY = startY + canvas.height;
  for (let x = 0; x < state.worldWidth; x += gridSize) {
    const sx = (x - state.worldWidth / 2) * viewScale + viewOffset.x;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < state.worldHeight; y += gridSize) {
    const sy = (y - state.worldHeight / 2) * viewScale + viewOffset.y;
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy); ctx.stroke();
  }
}

// === 绘制世界边界 ===
function drawWorldBounds() {
  const wx = (-state.worldWidth / 2) * viewScale + viewOffset.x;
  const wy = (-state.worldHeight / 2) * viewScale + viewOffset.y;
  const ww = state.worldWidth * viewScale;
  const wh = state.worldHeight * viewScale;
  ctx.strokeStyle = 'rgba(0,100,200,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(wx, wy, ww, wh);
  // 填充背景
  ctx.fillStyle = '#001030';
  ctx.fillRect(wx, wy, ww, wh);
}

// === 绘制单个物体 ===
function drawObject(obj, isSelected) {
  ctx.save();
  const sx = (obj.x - state.worldWidth / 2) * viewScale + viewOffset.x;
  const sy = (obj.y - state.worldHeight / 2) * viewScale + viewOffset.y;

  if (obj.type === 'start') {
    ctx.fillStyle = '#0f0';
    ctx.beginPath(); ctx.arc(sx, sy, 12 * viewScale, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
    ctx.fillText('START', sx, sy + 25 * viewScale);
  } else if (obj.type === 'end') {
    ctx.fillStyle = '#08f';
    ctx.beginPath(); ctx.arc(sx, sy, (obj.radius || 40) * viewScale, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
    ctx.fillText('END', sx, sy + (obj.radius || 40) * viewScale + 15);
  } else if (obj.type === 'circle') {
    ctx.fillStyle = '#f00';
    ctx.beginPath(); ctx.arc(sx, sy, (obj.radius || 30) * viewScale, 0, Math.PI * 2); ctx.fill();
  } else if (obj.type === 'rect') {
    const rw = (obj.w || 60) * viewScale;
    const rh = (obj.h || 40) * viewScale;
    ctx.fillStyle = 'rgba(0,80,180,0.25)';
    ctx.fillRect(sx - rw / 2, sy - rh / 2, rw, rh);
    ctx.strokeStyle = 'rgba(0,100,200,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx - rw / 2, sy - rh / 2, rw, rh);
  }

  // 选中状态
  if (isSelected) {
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2;
    if (obj.type === 'rect') {
      const rw = (obj.w || 60) * viewScale;
      const rh = (obj.h || 40) * viewScale;
      ctx.strokeRect(sx - rw / 2 - 3, sy - rh / 2 - 3, rw + 6, rh + 6);
    } else {
      ctx.beginPath();
      ctx.arc(sx, sy, ((obj.type === 'end' ? obj.radius : obj.type === 'circle' ? obj.radius : 12) || 30) * viewScale + 5, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// === 主渲染函数 ===
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawWorldBounds();
  drawGrid();
  // 绘制所有物体
  for (const obj of state.objects) {
    drawObject(obj, obj.id === state.selectedId);
  }
  // 选中时在属性面板显示信息
  if (state.selectedId !== null) {
    const obj = state.objects.find(o => o.id === state.selectedId);
    if (obj) updatePropsPanel(obj);
  }
  requestAnimationFrame(render);
}

// === 属性面板更新 ===
function updatePropsPanel(obj) {
  let panel = document.getElementById('props-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'props-panel';
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#222;border-top:2px solid #0af;padding:10px;display:flex;gap:8px;align-items:center;z-index:10;flex-wrap:wrap;';
    document.body.appendChild(panel);
  }
  const r = obj.type === 'rect' ? '' : `半径: <input id="prop-r" type="number" value="${obj.radius || ''}" style="width:60px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">`;
  panel.innerHTML = `
    ${obj.type !== 'rect' ? '' : ''}
    X: <input id="prop-x" type="number" value="${Math.round(obj.x)}" style="width:70px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">
    Y: <input id="prop-y" type="number" value="${Math.round(obj.y)}" style="width:70px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">
    ${obj.type === 'rect' ? `W: <input id="prop-w" type="number" value="${obj.w || 60}" style="width:60px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">
    H: <input id="prop-h" type="number" value="${obj.h || 40}" style="width:60px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">` : ''}
    ${obj.type === 'end' ? `半径: <input id="prop-radius" type="number" value="${obj.radius || 40}" style="width:60px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">` : ''}
    <span style="color:#aaa;margin-left:8px;">[${obj.type}]</span>
    <button onclick="deleteSelected()" style="margin-left:auto;background:#a22;color:#fff;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;">删除</button>
  `;

  // 绑定属性更新
  document.getElementById('prop-x')?.addEventListener('input', e => { obj.x = +e.target.value; });
  document.getElementById('prop-y')?.addEventListener('input', e => { obj.y = +e.target.value; });
  if (obj.type === 'rect') {
    document.getElementById('prop-w')?.addEventListener('input', e => { obj.w = +e.target.value; });
    document.getElementById('prop-h')?.addEventListener('input', e => { obj.h = +e.target.value; });
  }
  if (obj.type === 'end') {
    document.getElementById('prop-radius')?.addEventListener('input', e => { obj.radius = +e.target.value; });
  }
}

// === 删除选中物体 ===
window.deleteSelected = function() {
  if (state.selectedId !== null) {
    saveHistory();
    state.objects = state.objects.filter(o => o.id !== state.selectedId);
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
  }
};

// === 历史记录（撤销/重做）===
function saveHistory() {
  // 截断重做历史
  state.history = state.history.slice(0, state.historyIndex + 1);
  // 保存当前 objects 快照（深拷贝）
  state.history.push(JSON.parse(JSON.stringify(state.objects)));
  state.historyIndex = state.history.length - 1;
  // 限制历史步数
  if (state.history.length > 50) {
    state.history.shift();
    state.historyIndex--;
  }
}

function undo() {
  if (state.historyIndex > 0) {
    state.historyIndex--;
    state.objects = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
  }
}

function redo() {
  if (state.historyIndex < state.history.length - 1) {
    state.historyIndex++;
    state.objects = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
  }
}

// === 点击命中检测 ===
function hitTest(wx, wy) {
  // 按 z-order 逆序（后面的物体先检测）
  for (let i = state.objects.length - 1; i >= 0; i--) {
    const obj = state.objects[i];
    const dx = wx - obj.x;
    const dy = wy - obj.y;
    if (obj.type === 'rect') {
      const hw = (obj.w || 60) / 2, hh = (obj.h || 40) / 2;
      if (dx >= -hw && dx <= hw && dy >= -hh && dy <= hh) return obj;
    } else {
      const r = obj.type === 'end' ? (obj.radius || 40) : obj.type === 'circle' ? (obj.radius || 30) : 15;
      if (dx * dx + dy * dy <= r * r) return obj;
    }
  }
  return null;
}

// === 鼠标/触控事件 ===
let panStart = null;
let wasPanning = false;   // 防止 pan 后触发 click 误取消选中
let mouseScreen = { x: 0, y: 0 };

canvas.addEventListener('mousedown', e => {
  if (state.mode !== 'edit') return;
  const sx = e.clientX, sy = e.clientY;
  const w = screenToWorld(sx, sy);
  const hit = hitTest(w.x, w.y);
  mouseScreen = { x: sx, y: sy };

  if (state.activeTool === 'select') {
    if (hit) {
      state.selectedId = hit.id;
      state.dragState = { type: 'move', obj: hit, startWX: w.x, startWY: w.y, objStartX: hit.x, objStartY: hit.y };
    } else {
      state.selectedId = null;
      const panel = document.getElementById('props-panel');
      if (panel) panel.remove();
      panStart = { x: sx, y: sy, ox: state.viewOffset.x, oy: state.viewOffset.y };
    }
  } else {
    // 放置模式
    const newObj = { id: state.nextId++, x: w.x, y: w.y };
    if (state.activeTool === 'circle') {
      newObj.type = 'circle';
      newObj.radius = 40;
    } else if (state.activeTool === 'rect') {
      newObj.type = 'rect';
      newObj.w = 80;
      newObj.h = 40;
    } else if (state.activeTool === 'start') {
      // 替换已有起点
      const existing = state.objects.find(o => o.type === 'start');
      if (existing) { state.objects = state.objects.filter(o => o.id !== existing.id); }
      newObj.type = 'start';
    } else if (state.activeTool === 'end') {
      const existing = state.objects.find(o => o.type === 'end');
      if (existing) { state.objects = state.objects.filter(o => o.id !== existing.id); }
      newObj.type = 'end';
      newObj.radius = 40;
    }
    saveHistory();
    state.objects.push(newObj);
    state.selectedId = newObj.id;
  }
});

canvas.addEventListener('mousemove', e => {
  if (state.mode !== 'edit') return;
  const sx = e.clientX, sy = e.clientY;
  const w = screenToWorld(sx, sy);

  if (state.dragState && state.dragState.type === 'move') {
    const obj = state.objects.find(o => o.id === state.dragState.obj.id);
    if (obj) {
      obj.x = state.dragState.objStartX + (w.x - state.dragState.startWX);
      obj.y = state.dragState.objStartY + (w.y - state.dragState.startWY);
    }
  } else if (panStart) {
    state.viewOffset.x = panStart.ox + (sx - panStart.x);
    state.viewOffset.y = panStart.oy + (sy - panStart.y);
  }
});

canvas.addEventListener('mouseup', e => {
  if (state.mode !== 'edit') return;
  if (state.dragState) {
    // 拖拽结束，保存历史
    saveHistory();
    state.dragState = null;
  }
  wasPanning = panStart !== null;
  panStart = null;
});

canvas.addEventListener('click', e => {
  if (state.mode !== 'edit' || state.activeTool !== 'select' || wasPanning) {
    wasPanning = false;
    return;
  }
  const sx = e.clientX, sy = e.clientY;
  const w = screenToWorld(sx, sy);
  const hit = hitTest(w.x, w.y);
  state.selectedId = hit ? hit.id : null;
  const panel = document.getElementById('props-panel');
  if (!state.selectedId && panel) panel.remove();
});

// === 滚轮缩放 ===
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.1, Math.min(4, state.viewScale * factor));
  // 以鼠标位置为中心缩放
  const sx = e.clientX, sy = e.clientY;
  const wBefore = screenToWorld(sx, sy);
  state.viewScale = newScale;
  const wAfter = screenToWorld(sx, sy);
  state.viewOffset.x += (wAfter.x - wBefore.x) * state.viewScale;
  state.viewOffset.y += (wAfter.y - wBefore.y) * state.viewScale;
}, { passive: false });

// === 键盘快捷键 ===
window.addEventListener('keydown', e => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (state.mode === 'edit' && state.selectedId !== null) {
      saveHistory();
      state.objects = state.objects.filter(o => o.id !== state.selectedId);
      state.selectedId = null;
      const panel = document.getElementById('props-panel');
      if (panel) panel.remove();
    }
  }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redo(); }
});

// === 工具栏按钮 ===
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    state.activeTool = btn.dataset.tool;
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('btn-undo')?.addEventListener('click', undo);
document.getElementById('btn-redo')?.addEventListener('click', redo);

// === 导出 JS 代码 ===
function exportLevelCode() {
  const objects = state.objects.map(o => {
    if (o.type === 'start') return `{ type:'start', x:${Math.round(o.x)}, y:${Math.round(o.y)} }`;
    if (o.type === 'end')   return `{ type:'end',   x:${Math.round(o.x)}, y:${Math.round(o.y)}, radius:${o.radius||40} }`;
    if (o.type === 'circle') return `{ type:'circle', x:${Math.round(o.x)}, y:${Math.round(o.y)}, radius:${o.radius||30} }`;
    if (o.type === 'rect')  return `{ type:'rect',  x:${Math.round(o.x)}, y:${Math.round(o.y)}, w:${o.w||60}, h:${o.h||40} }`;
    return null;
  }).filter(Boolean);

  const code = `// 关卡数据\nconst LEVEL_W = ${state.worldWidth};\nconst LEVEL_H = ${state.worldHeight};\nconst fishScale = ${state.fishScale};\nconst levelObjects = [\n  ${objects.join(',\n  ')}\n];`;
  return code;
}

// === 显示导出弹窗 ===
document.getElementById('btn-export')?.addEventListener('click', () => {
  const code = exportLevelCode();
  const textarea = document.getElementById('export-code');
  textarea.value = code;
  document.getElementById('modal').classList.add('show');
});

// === 关闭弹窗 ===
document.getElementById('modal-close')?.addEventListener('click', () => {
  document.getElementById('modal').classList.remove('show');
});
document.getElementById('modal')?.addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('show');
  }
});

// === 复制到剪贴板 ===
function setupCopyBtn() {
  const modalActions = document.getElementById('modal-actions');
  if (!document.getElementById('btn-copy')) {
    const copyBtn = document.createElement('button');
    copyBtn.id = 'btn-copy';
    copyBtn.className = 'tool-btn';
    copyBtn.textContent = '📋 复制';
    copyBtn.style.cssText = 'background:#0af;color:#000;border-color:#0af;';
    copyBtn.addEventListener('click', () => {
      const code = document.getElementById('export-code').value;
      navigator.clipboard?.writeText(code).then(() => {
        copyBtn.textContent = '✅ 已复制!';
        setTimeout(() => { copyBtn.textContent = '📋 复制'; }, 1500);
      }).catch(() => {
        document.getElementById('export-code').select();
        document.execCommand('copy');
        copyBtn.textContent = '✅ 已复制!';
        setTimeout(() => { copyBtn.textContent = '📋 复制'; }, 1500);
      });
    });
    modalActions.prepend(copyBtn);
  }
}
setupCopyBtn();

// === 加载 JSON ===
document.getElementById('btn-load')?.addEventListener('click', () => {
  const json = prompt('粘贴关卡 JSON：');
  if (!json) return;
  try {
    const data = JSON.parse(json);
    if (data.worldWidth) state.worldWidth = data.worldWidth;
    if (data.worldHeight) state.worldHeight = data.worldHeight;
    if (data.fishScale) state.fishScale = data.fishScale;
    if (Array.isArray(data.objects)) {
      state.objects = data.objects.map(o => ({ ...o, id: state.nextId++ }));
      const maxId = Math.max(0, ...state.objects.map(o => o.id));
      state.nextId = maxId + 1;
    }
    saveHistory();
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
  } catch (e) {
    alert('JSON 格式错误: ' + e.message);
  }
});

// ==============================================
// 试玩模式
// ==============================================

let playState = null;   // null | { fish, angle, phase, vel, pos, launched, hitCount }

function startPlayMode() {
  const start = state.objects.find(o => o.type === 'start');
  const end = state.objects.find(o => o.type === 'end');
  if (!start) { alert('请先放置起点！'); return; }
  if (!end) { alert('请先放置终点！'); return; }

  state.mode = 'play';
  state.playFish = { x: start.x, y: start.y, angle: -Math.PI / 4, scale: state.fishScale };
  state.playInput = { angle: -Math.PI / 4 };
  state.playCamera = { x: state.playFish.x, y: state.playFish.y };

  playState = {
    phase: 'aim',    // 'aim' | 'fly' | 'win' | 'dead'
    angle: state.playFish.angle,
    vel: { x: 0, y: 0 },
    pos: { x: state.playFish.x, y: state.playFish.y },
    launched: false,
    hitCount: 0,
    aimTimer: 0,
    aimDir: 1,       // 旋转方向
    startTime: Date.now(),
  };

  document.getElementById('btn-play').textContent = '⏹ 退出';
  document.getElementById('btn-play').classList.add('active');
  document.getElementById('props-panel')?.remove();
  document.getElementById('play-hud')?.remove();
  const hud = document.createElement('div');
  hud.id = 'play-hud';
  hud.style.cssText = 'position:fixed;bottom:12px;right:12px;background:rgba(0,0,0,0.75);color:#fff;padding:8px 14px;border-radius:6px;font-size:13px;z-index:20;pointer-events:none;';
  hud.innerHTML = '<b>🎮 试玩中</b> — 方向键调整角度 | 空格发射 | ESC退出';
  document.body.appendChild(hud);

  // 方向键控制瞄准
  window.addEventListener('keydown', playKeyHandler);
  requestAnimationFrame(playLoop);
}

function stopPlayMode() {
  state.mode = 'edit';
  playState = null;
  window.removeEventListener('keydown', playKeyHandler);
  document.getElementById('play-hud')?.remove();
  document.getElementById('btn-play').textContent = '▶️ 试玩';
  document.getElementById('btn-play').classList.remove('active');
}

function playKeyHandler(e) {
  if (!playState) return;
  if (e.key === 'Escape') { stopPlayMode(); return; }
  if (playState.phase === 'aim') {
    const speed = 0.06;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      playState.angle -= speed; playState.aimDir = -1;
    }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      playState.angle += speed; playState.aimDir = 1;
    }
    if (e.key === ' ') {
      e.preventDefault();
      // 发射！
      const speed2 = 15;
      playState.vel.x = Math.cos(playState.angle) * speed2;
      playState.vel.y = Math.sin(playState.angle) * speed2;
      playState.phase = 'fly';
      playState.launched = true;
    }
  }
}

function playCircleCollide(px, py, cx, cy, r) {
  const dx = px - cx, dy = py - cy;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d < r + 8) {
    const nx = dx / d, ny = dy / d;
    // 反射速度
    const dot = playState.vel.x * nx + playState.vel.y * ny;
    if (dot < 0) {
      playState.vel.x -= 2 * dot * nx;
      playState.vel.y -= 2 * dot * ny;
    }
    // 推出碰撞区
    playState.pos.x = cx + nx * (r + 9);
    playState.pos.y = cy + ny * (r + 9);
    return true;
  }
  return false;
}

function playRectCollide(px, py, rw, rh, rx, ry) {
  const hw = rw / 2, hh = rh / 2;
  const cx = rx, cy = ry;
  const nx = Math.max(cx - hw, Math.min(px, cx + hw));
  const ny = Math.max(cy - hh, Math.min(py, cy + hh));
  const dx = px - nx, dy = py - ny;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d < 9) {
    if (d > 0) {
      playState.vel.x += dx / d * (9 - d + 1);
      playState.vel.y += dy / d * (9 - d + 1);
    }
    // push out
    if (Math.abs(dx) > Math.abs(dy)) {
      playState.vel.x *= -0.8;
      playState.pos.x = dx > 0 ? cx + hw + 1 : cx - hw - 1;
    } else {
      playState.vel.y *= -0.8;
      playState.pos.y = dy > 0 ? cy + hh + 1 : cy - hh - 1;
    }
    return true;
  }
  return false;
}

function playLoop() {
  if (state.mode !== 'play' || !playState) return;

  const dt = 1 / 60;
  if (playState.phase === 'fly') {
    // 重力
    playState.vel.y += 0.5;
    playState.pos.x += playState.vel.x;
    playState.pos.y += playState.vel.y;
    playState.hitCount++;

    // 边界反弹
    const hw = state.worldWidth / 2, hh = state.worldHeight / 2;
    if (playState.pos.x < -hw + 8) { playState.pos.x = -hw + 8; playState.vel.x *= -0.8; }
    if (playState.pos.x > hw - 8) { playState.pos.x = hw - 8; playState.vel.x *= -0.8; }
    if (playState.pos.y > hh - 8) { playState.pos.y = hh - 8; playState.vel.y *= -0.8; }
    if (playState.pos.y < -hh + 8) { playState.vel.y *= -0.8; }

    // 障碍碰撞
    for (const obj of state.objects) {
      if (obj.type === 'circle') {
        playCircleCollide(playState.pos.x, playState.pos.y, obj.x, obj.y, obj.radius || 30);
      } else if (obj.type === 'rect') {
        playRectCollide(playState.pos.x, playState.pos.y, obj.w || 60, obj.h || 40, obj.x, obj.y);
      }
    }

    // 终点检测
    const end = state.objects.find(o => o.type === 'end');
    if (end) {
      const dx = playState.pos.x - end.x, dy = playState.pos.y - end.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < (end.radius || 40) + 5) {
        playState.phase = 'win';
        setTimeout(() => {
          alert('🎉 通关！用了 ' + playState.hitCount + ' 次弹射');
          stopPlayMode();
        }, 100);
        requestAnimationFrame(playLoop);
        return;
      }
    }

    // 超时自动重置
    if (Date.now() - playState.startTime > 20000) {
      playState.phase = 'dead';
      setTimeout(() => {
        alert('😵 掉出边界太久，重新开始！');
        stopPlayMode();
        setTimeout(startPlayMode, 50);
      }, 100);
      requestAnimationFrame(playLoop);
      return;
    }
  }

  // 更新摄像机
  if (state.playCamera) {
    const tx = state.playCamera.x + (playState.pos.x - state.playCamera.x) * 0.08;
    const ty = state.playCamera.y + (playState.pos.y - state.playCamera.y) * 0.08;
    state.playCamera.x = tx;
    state.playCamera.y = ty;
  }

  // 渲染试玩画面（覆盖在编辑器画布上）
  const prevOffset = { ...state.viewOffset };
  const prevScale = state.viewScale;
  if (state.playCamera) {
    state.viewOffset = { x: canvas.width / 2 - state.playCamera.x, y: canvas.height / 2 - state.playCamera.y };
  }

  // 绘制游戏画面
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 背景
  ctx.fillStyle = '#000d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 边界
  drawWorldBounds();

  // 障碍物（红色/橙色）
  for (const obj of state.objects) {
    if (obj.type === 'circle' || obj.type === 'rect') {
      ctx.save();
      const sx = (obj.x - state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
      const sy = (obj.y - state.worldHeight / 2) * state.viewScale + state.viewOffset.y;
      if (obj.type === 'circle') {
        ctx.fillStyle = '#f33';
        ctx.beginPath(); ctx.arc(sx, sy, (obj.radius || 30) * state.viewScale, 0, Math.PI * 2); ctx.fill();
      } else {
        const rw = (obj.w || 60) * state.viewScale, rh = (obj.h || 40) * state.viewScale;
        ctx.fillStyle = 'rgba(220,60,0,0.4)';
        ctx.fillRect(sx - rw / 2, sy - rh / 2, rw, rh);
        ctx.strokeStyle = '#e84';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - rw / 2, sy - rh / 2, rw, rh);
      }
      ctx.restore();
    }
  }

  // 终点
  const end2 = state.objects.find(o => o.type === 'end');
  if (end2) {
    ctx.save();
    const sx = (end2.x - state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
    const sy = (end2.y - state.worldHeight / 2) * state.viewScale + state.viewOffset.y;
    ctx.fillStyle = '#08f';
    ctx.beginPath(); ctx.arc(sx, sy, (end2.radius || 40) * state.viewScale, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // 弹射轨迹预览（瞄准时）
  if (playState.phase === 'aim') {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,0,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(
      (playState.pos.x - state.worldWidth / 2) * state.viewScale + state.viewOffset.x,
      (playState.pos.y - state.worldHeight / 2) * state.viewScale + state.viewOffset.y
    );
    const len = 60;
    ctx.lineTo(
      (playState.pos.x + Math.cos(playState.angle) * len - state.worldWidth / 2) * state.viewScale + state.viewOffset.x,
      (playState.pos.y + Math.sin(playState.angle) * len - state.worldWidth / 2) * state.viewScale + state.viewOffset.y
    );
    ctx.stroke();
    ctx.restore();
  }

  // 绘制鱼
  ctx.save();
  const fishX = (playState.pos.x - state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
  const fishY = (playState.pos.y - state.worldHeight / 2) * state.viewScale + state.viewOffset.y;
  const fishR = 14 * (state.fishScale || 1) * state.viewScale;
  ctx.translate(fishX, fishY);
  ctx.rotate(playState.vel.x !== 0 || playState.vel.y !== 0
    ? Math.atan2(playState.vel.y, playState.vel.x)
    : playState.angle);

  // 鱼身
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(0, 0, fishR, 0, Math.PI * 2); ctx.fill();
  // 眼睛
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(fishR * 0.4, -fishR * 0.3, fishR * 0.25, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(fishR * 0.48, -fishR * 0.33, fishR * 0.1, 0, Math.PI * 2); ctx.fill();
  // 鱼鳍
  ctx.fillStyle = '#ff9900';
  ctx.beginPath();
  ctx.moveTo(-fishR * 0.2, -fishR * 0.8);
  ctx.lineTo(fishR * 0.1, -fishR * 0.3);
  ctx.lineTo(-fishR * 0.5, -fishR * 0.2);
  ctx.closePath(); ctx.fill();

  ctx.restore();

  // HUD信息
  ctx.fillStyle = '#0f0';
  ctx.font = '14px monospace';
  ctx.fillText(`命中: ${playState.hitCount}`, 12, canvas.height - 14);
  if (playState.phase === 'win') ctx.fillText('🎉 通关！', 12, canvas.height - 36);

  // 恢复视图
  state.viewOffset = prevOffset;
  state.viewScale = prevScale;

  requestAnimationFrame(playLoop);
}

// === 试玩按钮 ===
document.getElementById('btn-play')?.addEventListener('click', () => {
  if (state.mode === 'edit') {
    startPlayMode();
  } else {
    stopPlayMode();
  }
});

// === 初始化时开始渲染循环 ===
init = function() {
  // 初始化历史记录
  saveHistory();
  requestAnimationFrame(render);
};
init();
</script>
</body>
</html>
