<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弹弹河豚 - 关卡编辑器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  /* 工具栏 */
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    background: #222; border-bottom: 2px solid #0af;
    display: flex; align-items: center; padding: 0 10px; gap: 4px; z-index: 10;
  }
  .toolbar-group { display: flex; gap: 4px; align-items: center; }
  .toolbar-sep { width: 1px; height: 28px; background: #555; margin: 0 6px; }
  .tool-btn {
    padding: 5px 10px; background: #333; color: #ccc; border: 1px solid #555;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .tool-btn:hover { background: #444; color: #fff; }
  .tool-btn.active { background: #0af; color: #000; border-color: #0af; font-weight: bold; }
  .tool-btn.danger { background: #a22; color: #fff; border-color: #a22; }
  .tool-btn.primary { background: #0a6; color: #fff; border-color: #0a6; }
  #fish-scale-label { color: #aaa; font-size: 12px; white-space: nowrap; }
  #fish-scale { accent-color: #0af; width: 80px; vertical-align: middle; }
  #shortcuts-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #1a1a1a; border-top: 1px solid #333;
    padding: 5px 14px; display: flex; gap: 20px;
    font-size: 11px; color: #888; z-index: 10;
  }
  #shortcuts-bar span { white-space: nowrap; }
  #shortcuts-bar span b { color: #0af; font-weight: normal; }
  /* 模态框 */
  #modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; justify-content: center; align-items: center;
  }
  #modal.show { display: flex; }
  #modal-content {
    background: #222; border: 2px solid #0af; border-radius: 8px;
    padding: 20px; min-width: 500px; max-width: 700px; color: #fff;
  }
  #modal-content h3 { margin-bottom: 12px; color: #0af; }
  #export-code {
    width: 100%; height: 300px; background: #111; color: #0f0;
    border: 1px solid #444; border-radius: 4px; font-family: monospace;
    font-size: 12px; padding: 8px; resize: none;
  }
  #modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="toolbar">
  <div class="toolbar-group">
    <button class="tool-btn active" id="btn-select" data-tool="select">🖱️ 选择</button>
    <button class="tool-btn" id="btn-circle" data-tool="circle">🔴 圆形</button>
    <button class="tool-btn" id="btn-rect" data-tool="rect">🟦 方块</button>
    <button class="tool-btn" id="btn-start" data-tool="start">🟢 起点</button>
    <button class="tool-btn" id="btn-end" data-tool="end">🔵 终点</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tool-btn" id="btn-undo">↩️ 撤销</button>
    <button class="tool-btn" id="btn-redo">↪️ 重做</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tool-btn primary" id="btn-play">▶️ 试玩</button>
    <button class="tool-btn" id="btn-export">📋 导出</button>
    <button class="tool-btn" id="btn-load">📂 加载</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group" style="gap:6px;">
    <label id="fish-scale-label" for="fish-scale">🌊 鱼大小:</label>
    <input type="range" id="fish-scale" min="0.5" max="2" step="0.1" value="1">
  </div>
</div>
<div id="shortcuts-bar">
  <span>🎮 试玩: <b>鼠标按住</b> 膨胀旋转 &nbsp;|&nbsp; <b>松开</b> 发射 &nbsp;|&nbsp; <b>ESC</b> 退出</span>
  <span>✏️ 编辑: <b>Ctrl+Z</b> 撤销 &nbsp;|&nbsp; <b>Ctrl+Y</b> 重做 &nbsp;|&nbsp; <b>Delete</b> / <b>Backspace</b> 删除选中</span>
</div>
<div id="modal">
  <div id="modal-content">
    <h3>复制关卡代码</h3>
    <textarea id="export-code" readonly></textarea>
    <div id="modal-actions">
      <button class="tool-btn" id="modal-close">关闭</button>
    </div>
  </div>
</div>
<script>
// === 世界尺寸拖拽状态 ===
let worldResize = null; // null | { edge: 'right'|'bottom', startX, startY, startW, startH }

// === 状态 ===
const state = {
  worldWidth: 2200,
  worldHeight: 750,
  fishScale: 1.0,
  objects: [],
  history: [],
  historyIndex: -1,
  mode: 'edit',       // 'edit' | 'play'
  selectedId: null,
  activeTool: 'select',
  viewOffset: { x: 0, y: 0 },       // 由 init() 根据窗口大小居中
  viewScale: 1.0,
  dragState: null,
  nextId: 1,
  // 试玩模式
  playFish: null,
  playInput: null,
  playCamera: null,
};
// === 入口 ===
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initCamera(); }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
function initCamera() {
  // 根据窗口大小自动缩放，让世界完整可见
  const scaleX = canvas.width / state.worldWidth;
  const scaleY = canvas.height / state.worldHeight;
  state.viewScale = Math.min(scaleX, scaleY) * 0.9; // 留10%边距
  // 世界中心对齐屏幕中心（viewOffset 是世界中心的屏幕坐标）
  state.viewOffset.x = canvas.width / 2;
  state.viewOffset.y = canvas.height / 2;
}
// === 坐标转换 ===
// 将屏幕坐标转换为世界坐标
function screenToWorld(sx, sy) {
  return {
    x: (sx - state.viewOffset.x) / state.viewScale + state.worldWidth / 2,
    y: (sy - state.viewOffset.y) / state.viewScale + state.worldHeight / 2
  };
}

// === 绘制网格 ===
function drawGrid() {
  const gridSize = 50;
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  // 只画可见区域内的线
  const startX = -state.viewOffset.x * state.viewScale;
  const startY = -state.viewOffset.y * state.viewScale;
  const endX = startX + canvas.width;
  const endY = startY + canvas.height;
  for (let x = 0; x < state.worldWidth; x += gridSize) {
    const sx = (x - state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < state.worldHeight; y += gridSize) {
    const sy = (y - state.worldHeight / 2) * state.viewScale + state.viewOffset.y;
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy); ctx.stroke();
  }
}

// === 绘制世界边界 ===
function drawWorldBounds() {
  const wx = (-state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
  const wy = (-state.worldHeight / 2) * state.viewScale + state.viewOffset.y;
  const ww = state.worldWidth * state.viewScale;
  const wh = state.worldHeight * state.viewScale;
  ctx.strokeStyle = 'rgba(0,100,200,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(wx, wy, ww, wh);
  // 填充背景
  ctx.fillStyle = '#001030';
  ctx.fillRect(wx, wy, ww, wh);
}

// === 绘制单个物体 ===
function drawObject(obj, isSelected) {
  ctx.save();
  const sx = (obj.x - state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
  const sy = (obj.y - state.worldHeight / 2) * state.viewScale + state.viewOffset.y;

  if (obj.type === 'start') {
    ctx.fillStyle = '#0f0';
    ctx.beginPath(); ctx.arc(sx, sy, 12 * state.viewScale, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
    ctx.fillText('START', sx, sy + 25 * state.viewScale);
  } else if (obj.type === 'end') {
    ctx.fillStyle = '#08f';
    ctx.beginPath(); ctx.arc(sx, sy, (obj.radius || 40) * state.viewScale, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
    ctx.fillText('END', sx, sy + (obj.radius || 40) * state.viewScale + 15);
  } else if (obj.type === 'circle') {
    ctx.fillStyle = '#f00';
    ctx.beginPath(); ctx.arc(sx, sy, (obj.radius || 30) * state.viewScale, 0, Math.PI * 2); ctx.fill();
  } else if (obj.type === 'rect') {
    const rw = (obj.w || 60) * state.viewScale;
    const rh = (obj.h || 40) * state.viewScale;
    ctx.fillStyle = 'rgba(0,80,180,0.25)';
    ctx.fillRect(sx - rw / 2, sy - rh / 2, rw, rh);
    ctx.strokeStyle = 'rgba(0,100,200,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx - rw / 2, sy - rh / 2, rw, rh);
  }

  // 选中状态
  if (isSelected) {
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2;
    if (obj.type === 'rect') {
      const rw = (obj.w || 60) * state.viewScale;
      const rh = (obj.h || 40) * state.viewScale;
      ctx.strokeRect(sx - rw / 2 - 3, sy - rh / 2 - 3, rw + 6, rh + 6);
    } else {
      ctx.beginPath();
      ctx.arc(sx, sy, ((obj.type === 'end' ? obj.radius : obj.type === 'circle' ? obj.radius : 12) || 30) * state.viewScale + 5, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// === 主渲染函数 ===
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawWorldBounds();
  drawGrid();
  // 绘制所有物体
  for (const obj of state.objects) {
    drawObject(obj, obj.id === state.selectedId);
  }
  // 选中时在属性面板显示信息
  if (state.selectedId !== null) {
    const obj = state.objects.find(o => o.id === state.selectedId);
    if (obj) updatePropsPanel(obj);
  }
  drawResizeHandles();
  requestAnimationFrame(render);
}

// === 世界尺寸拖拽视觉把手 ===
function drawResizeHandles() {
  const canvasRight = canvas.width;
  const canvasBottom = canvas.height;

  // 世界边缘的屏幕坐标
  const sxRight = (state.worldWidth - state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
  const syBottom = (state.worldHeight - state.worldHeight / 2) * state.viewScale + state.viewOffset.y;

  ctx.save();

  // 右边缘把手（宽8px高100%的竖条）
  ctx.fillStyle = worldResize?.edge === 'right' ? 'rgba(0,200,255,0.4)' : 'rgba(0,150,220,0.15)';
  ctx.fillRect(canvasRight - 8, 0, 8, canvasBottom);
  // 拖拽指示线（世界右边缘）
  ctx.strokeStyle = worldResize?.edge === 'right' ? '#0cf' : 'rgba(0,200,255,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(sxRight, Math.max(0, state.viewOffset.y));
  ctx.lineTo(sxRight, Math.min(canvasBottom, state.viewOffset.y + state.worldHeight * state.viewScale));
  ctx.stroke();

  // 下边缘把手（宽100%高8px的横条）
  ctx.fillStyle = worldResize?.edge === 'bottom' ? 'rgba(0,200,255,0.4)' : 'rgba(0,150,220,0.15)';
  ctx.fillRect(0, canvasBottom - 8, canvasRight, 8);
  // 拖拽指示线（世界下边缘）
  ctx.strokeStyle = worldResize?.edge === 'bottom' ? '#0cf' : 'rgba(0,200,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(Math.max(0, state.viewOffset.x), syBottom);
  ctx.lineTo(Math.min(canvasRight, state.viewOffset.x + state.worldWidth * state.viewScale), syBottom);
  ctx.stroke();

  // 尺寸标注
  ctx.setLineDash([]);
  ctx.fillStyle = '#0cf';
  ctx.font = '12px monospace';
  ctx.fillText(`${state.worldWidth}×${state.worldHeight}`, canvasRight - 88, canvasBottom - 12);

  ctx.restore();
}

// === 世界尺寸拖拽命中检测 ===
function worldResizeHitTest(sx, sy) {
  const canvasRight = canvas.width;
  const canvasBottom = canvas.height;
  // 右边缘（最后8px）
  if (sx >= canvasRight - 8) return 'right';
  // 下边缘（最后8px）
  if (sy >= canvasBottom - 8) return 'bottom';
  return null;
}

// === 世界尺寸拖拽事件 ===
canvas.addEventListener('mousedown', e => {
  if (state.mode !== 'edit') return;
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const edge = worldResizeHitTest(sx, sy);
  if (edge) {
    worldResize = { edge, startX: sx, startY: sy, startW: state.worldWidth, startH: state.worldHeight };
    e.stopImmediatePropagation();  // 阻止后续监听器
    e.preventDefault();
  }
}, { capture: true });  // 优先执行

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  // 更新鼠标样式
  const edge = worldResizeHitTest(sx, sy);
  canvas.style.cursor = edge ? 'ew-resize' : '';

  if (worldResize) {
    const dx = (sx - worldResize.startX) / state.viewScale;
    const dy = (sy - worldResize.startY) / state.viewScale;
    if (worldResize.edge === 'right') {
      state.worldWidth = Math.max(400, Math.round(worldResize.startW + dx));
    }
    if (worldResize.edge === 'bottom') {
      state.worldHeight = Math.max(300, Math.round(worldResize.startH + dy));
    }
  }
});

canvas.addEventListener('mouseup', e => {
  if (worldResize) {
    saveHistory();
    worldResize = null;
  }
});

canvas.addEventListener('mouseleave', () => {
  if (worldResize) { worldResize = null; }
});

// === 属性面板更新 ===
function updatePropsPanel(obj) {
  let panel = document.getElementById('props-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'props-panel';
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#222;border-top:2px solid #0af;padding:10px;display:flex;gap:8px;align-items:center;z-index:10;flex-wrap:wrap;';
    document.body.appendChild(panel);
  }
  const r = obj.type === 'rect' ? '' : `半径: <input id="prop-r" type="number" value="${obj.radius || ''}" style="width:60px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">`;
  panel.innerHTML = `
    ${obj.type !== 'rect' ? '' : ''}
    X: <input id="prop-x" type="number" value="${Math.round(obj.x)}" style="width:70px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">
    Y: <input id="prop-y" type="number" value="${Math.round(obj.y)}" style="width:70px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">
    ${obj.type === 'rect' ? `W: <input id="prop-w" type="number" value="${obj.w || 60}" style="width:60px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">
    H: <input id="prop-h" type="number" value="${obj.h || 40}" style="width:60px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">` : ''}
    ${obj.type === 'end' ? `半径: <input id="prop-radius" type="number" value="${obj.radius || 40}" style="width:60px;background:#333;color:#fff;border:1px solid #555;padding:3px;border-radius:3px;">` : ''}
    <span style="color:#aaa;margin-left:8px;">[${obj.type}]</span>
    <button onclick="deleteSelected()" style="margin-left:auto;background:#a22;color:#fff;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;">删除</button>
  `;

  // 绑定属性更新
  document.getElementById('prop-x')?.addEventListener('input', e => { obj.x = +e.target.value; });
  document.getElementById('prop-y')?.addEventListener('input', e => { obj.y = +e.target.value; });
  if (obj.type === 'rect') {
    document.getElementById('prop-w')?.addEventListener('input', e => { obj.w = +e.target.value; });
    document.getElementById('prop-h')?.addEventListener('input', e => { obj.h = +e.target.value; });
  }
  if (obj.type === 'circle') {
    document.getElementById('prop-r')?.addEventListener('input', e => { obj.radius = +e.target.value; });
  }
  if (obj.type === 'end') {
    document.getElementById('prop-radius')?.addEventListener('input', e => { obj.radius = +e.target.value; });
  }
}

// === 删除选中物体 ===
window.deleteSelected = function() {
  if (state.selectedId !== null) {
    saveHistory();
    state.objects = state.objects.filter(o => o.id !== state.selectedId);
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
  }
};

// === 历史记录（撤销/重做）===
function saveHistory() {
  // 截断重做历史
  state.history = state.history.slice(0, state.historyIndex + 1);
  // 保存当前 objects 快照（深拷贝）
  state.history.push(JSON.parse(JSON.stringify(state.objects)));
  state.historyIndex = state.history.length - 1;
  // 限制历史步数
  if (state.history.length > 50) {
    state.history.shift();
    state.historyIndex--;
  }
}

function undo() {
  if (state.historyIndex > 0) {
    state.historyIndex--;
    state.objects = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
  }
}

function redo() {
  if (state.historyIndex < state.history.length - 1) {
    state.historyIndex++;
    state.objects = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
  }
}

// === 点击命中检测 ===
function hitTest(wx, wy) {
  // 按 z-order 逆序（后面的物体先检测）
  for (let i = state.objects.length - 1; i >= 0; i--) {
    const obj = state.objects[i];
    const dx = wx - obj.x;
    const dy = wy - obj.y;
    if (obj.type === 'rect') {
      const hw = (obj.w || 60) / 2, hh = (obj.h || 40) / 2;
      if (dx >= -hw && dx <= hw && dy >= -hh && dy <= hh) return obj;
    } else {
      const r = obj.type === 'end' ? (obj.radius || 40) : obj.type === 'circle' ? (obj.radius || 30) : 15;
      if (dx * dx + dy * dy <= r * r) return obj;
    }
  }
  return null;
}

// === 鼠标/触控事件 ===
let panStart = null;
let wasPanning = false;   // 防止 pan 后触发 click 误取消选中
let mouseScreen = { x: 0, y: 0 };

canvas.addEventListener('mousedown', e => {
  if (state.mode !== 'edit') return;
  const sx = e.clientX, sy = e.clientY;
  const w = screenToWorld(sx, sy);
  const hit = hitTest(w.x, w.y);
  mouseScreen = { x: sx, y: sy };

  if (state.activeTool === 'select') {
    if (hit) {
      state.selectedId = hit.id;
      state.dragState = { type: 'move', obj: hit, startWX: w.x, startWY: w.y, objStartX: hit.x, objStartY: hit.y };
    } else {
      state.selectedId = null;
      const panel = document.getElementById('props-panel');
      if (panel) panel.remove();
      panStart = { x: sx, y: sy, ox: state.viewOffset.x, oy: state.viewOffset.y };
    }
  } else {
    // 放置模式
    const newObj = { id: state.nextId++, x: w.x, y: w.y };
    if (state.activeTool === 'circle') {
      newObj.type = 'circle';
      newObj.radius = 40;
    } else if (state.activeTool === 'rect') {
      newObj.type = 'rect';
      newObj.w = 80;
      newObj.h = 40;
    } else if (state.activeTool === 'start') {
      // 替换已有起点
      const existing = state.objects.find(o => o.type === 'start');
      if (existing) { state.objects = state.objects.filter(o => o.id !== existing.id); }
      newObj.type = 'start';
    } else if (state.activeTool === 'end') {
      const existing = state.objects.find(o => o.type === 'end');
      if (existing) { state.objects = state.objects.filter(o => o.id !== existing.id); }
      newObj.type = 'end';
      newObj.radius = 40;
    }
    saveHistory();
    state.objects.push(newObj);
    state.selectedId = newObj.id;
  }
});

canvas.addEventListener('mousemove', e => {
  if (state.mode !== 'edit') return;
  const sx = e.clientX, sy = e.clientY;
  const w = screenToWorld(sx, sy);

  if (state.dragState && state.dragState.type === 'move') {
    const obj = state.objects.find(o => o.id === state.dragState.obj.id);
    if (obj) {
      obj.x = state.dragState.objStartX + (w.x - state.dragState.startWX);
      obj.y = state.dragState.objStartY + (w.y - state.dragState.startWY);
    }
  } else if (panStart) {
    state.viewOffset.x = panStart.ox + (sx - panStart.x);
    state.viewOffset.y = panStart.oy + (sy - panStart.y);
  }
});

canvas.addEventListener('mouseup', e => {
  if (state.mode !== 'edit') return;
  if (state.dragState) {
    // 拖拽结束，保存历史
    saveHistory();
    state.dragState = null;
  }
  wasPanning = panStart !== null;
  panStart = null;
});

canvas.addEventListener('click', e => {
  if (state.mode !== 'edit' || state.activeTool !== 'select' || wasPanning) {
    wasPanning = false;
    return;
  }
  const sx = e.clientX, sy = e.clientY;
  const w = screenToWorld(sx, sy);
  const hit = hitTest(w.x, w.y);
  state.selectedId = hit ? hit.id : null;
  const panel = document.getElementById('props-panel');
  if (!state.selectedId && panel) panel.remove();
});

// === 滚轮缩放 ===
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.1, Math.min(4, state.viewScale * factor));
  // 以鼠标位置为中心缩放
  const sx = e.clientX, sy = e.clientY;
  const wBefore = screenToWorld(sx, sy);
  state.viewScale = newScale;
  const wAfter = screenToWorld(sx, sy);
  state.viewOffset.x += (wAfter.x - wBefore.x) * state.viewScale;
  state.viewOffset.y += (wAfter.y - wBefore.y) * state.viewScale;
}, { passive: false });

// === 键盘快捷键 ===
window.addEventListener('keydown', e => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (state.mode === 'edit' && state.selectedId !== null) {
      saveHistory();
      state.objects = state.objects.filter(o => o.id !== state.selectedId);
      state.selectedId = null;
      const panel = document.getElementById('props-panel');
      if (panel) panel.remove();
    }
  }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redo(); }
});

// === 工具栏按钮 ===
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    state.activeTool = btn.dataset.tool;
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('btn-undo')?.addEventListener('click', undo);
document.getElementById('btn-redo')?.addEventListener('click', redo);
document.getElementById('fish-scale')?.addEventListener('input', e => {
  state.fishScale = parseFloat(e.target.value);
});

// === 导出 JS 代码 ===
function exportLevelCode() {
  const objects = state.objects.map(o => {
    if (o.type === 'start') return `{ type:'start', x:${Math.round(o.x)}, y:${Math.round(o.y)} }`;
    if (o.type === 'end')   return `{ type:'end',   x:${Math.round(o.x)}, y:${Math.round(o.y)}, radius:${o.radius||40} }`;
    if (o.type === 'circle') return `{ type:'circle', x:${Math.round(o.x)}, y:${Math.round(o.y)}, radius:${o.radius||30} }`;
    if (o.type === 'rect')  return `{ type:'rect',  x:${Math.round(o.x)}, y:${Math.round(o.y)}, w:${o.w||60}, h:${o.h||40} }`;
    return null;
  }).filter(Boolean);

  const code = `// 关卡数据\nconst LEVEL_W = ${state.worldWidth};\nconst LEVEL_H = ${state.worldHeight};\nconst fishScale = ${state.fishScale};\nconst levelObjects = [\n  ${objects.join(',\n  ')}\n];`;
  return code;
}

// === 显示导出弹窗 ===
document.getElementById('btn-export')?.addEventListener('click', () => {
  const code = exportLevelCode();
  const textarea = document.getElementById('export-code');
  textarea.value = code;
  document.getElementById('modal').classList.add('show');
});

// === 关闭弹窗 ===
document.getElementById('modal-close')?.addEventListener('click', () => {
  document.getElementById('modal').classList.remove('show');
});
document.getElementById('modal')?.addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('show');
  }
});

// === 复制到剪贴板 ===
function setupCopyBtn() {
  const modalActions = document.getElementById('modal-actions');
  if (!document.getElementById('btn-copy')) {
    const copyBtn = document.createElement('button');
    copyBtn.id = 'btn-copy';
    copyBtn.className = 'tool-btn';
    copyBtn.textContent = '📋 复制';
    copyBtn.style.cssText = 'background:#0af;color:#000;border-color:#0af;';
    copyBtn.addEventListener('click', () => {
      const code = document.getElementById('export-code').value;
      navigator.clipboard?.writeText(code).then(() => {
        copyBtn.textContent = '✅ 已复制!';
        setTimeout(() => { copyBtn.textContent = '📋 复制'; }, 1500);
      }).catch(() => {
        document.getElementById('export-code').select();
        document.execCommand('copy');
        copyBtn.textContent = '✅ 已复制!';
        setTimeout(() => { copyBtn.textContent = '📋 复制'; }, 1500);
      });
    });
    modalActions.prepend(copyBtn);
  }
}
setupCopyBtn();

// === 加载 JSON ===
document.getElementById('btn-load')?.addEventListener('click', () => {
  const json = prompt('粘贴关卡 JSON：');
  if (!json) return;
  try {
    const data = JSON.parse(json);
    if (data.worldWidth) state.worldWidth = data.worldWidth;
    if (data.worldHeight) state.worldHeight = data.worldHeight;
    if (data.fishScale) state.fishScale = data.fishScale;
    if (Array.isArray(data.objects)) {
      state.objects = data.objects.map(o => ({ ...o, id: state.nextId++ }));
      const maxId = Math.max(0, ...state.objects.map(o => o.id));
      state.nextId = maxId + 1;
    }
    saveHistory();
    state.selectedId = null;
    const panel = document.getElementById('props-panel');
    if (panel) panel.remove();
  } catch (e) {
    alert('JSON 格式错误: ' + e.message);
  }
});

// ==============================================
// 试玩模式 - 原游戏鱼逻辑
// ==============================================

let playState = null;   // { fish, input, phase, startTime }
let playMouseHandler = null;

function startPlayMode() {
  const start = state.objects.find(o => o.type === 'start');
  const end = state.objects.find(o => o.type === 'end');
  if (!start) { alert('请先放置起点！'); return; }
  if (!end) { alert('请先放置终点！'); return; }

  state.mode = 'play';

  // 初始化鱼（原游戏参数）
  const fish = {
    x: start.x,
    y: start.y,
    radius: 20,
    vx: 0,
    vy: 0,
    scale: 1.0,
    inflate: 0,
    maxInflate: 1.0,
    launchVel: 900,
    friction: 0.992,
    rotation: -Math.PI / 2,
    rotSpeed: 6,
    hp: 100,
    maxHp: 100,
    invincible: 0,
    waveAmp: 0,
    waveOffset: 0,
    launchScale: 1.0,
    launchTime: 0
  };

  // 输入状态
  const input = {
    clicking: false,
    lastClick: false
  };

  playState = {
    fish,
    input,
    phase: 'play',    // 'play' | 'win' | 'dead'
    startTime: Date.now()
  };

  state.playCamera = { x: fish.x, y: fish.y };

  document.getElementById('btn-play').textContent = '⏹ 退出';
  document.getElementById('btn-play').classList.add('active');
  document.getElementById('props-panel')?.remove();
  document.getElementById('play-hud')?.remove();
  const hud = document.createElement('div');
  hud.id = 'play-hud';
  hud.style.cssText = 'position:fixed;bottom:12px;right:12px;background:rgba(0,0,0,0.75);color:#fff;padding:8px 14px;border-radius:6px;font-size:13px;z-index:20;pointer-events:none;';
  hud.innerHTML = '<b>🎮 试玩中</b> — 鼠标按住膨胀 | 松开发射 | ESC退出';
  document.body.appendChild(hud);

  // 鼠标事件
  playMouseHandler = (e) => {
    if (state.mode !== 'play') return;
    if (e.type === 'mousedown') {
      input.clicking = true;
    } else if (e.type === 'mouseup') {
      input.clicking = false;
    }
  };
  canvas.addEventListener('mousedown', playMouseHandler);
  canvas.addEventListener('mouseup', playMouseHandler);

  // ESC 退出
  window.addEventListener('keydown', playEscHandler);

  requestAnimationFrame(playLoop);
}

function playEscHandler(e) {
  if (e.key === 'Escape' && state.mode === 'play') {
    stopPlayMode();
  }
}

function stopPlayMode() {
  state.mode = 'edit';
  if (playMouseHandler) {
    canvas.removeEventListener('mousedown', playMouseHandler);
    canvas.removeEventListener('mouseup', playMouseHandler);
    playMouseHandler = null;
  }
  window.removeEventListener('keydown', playEscHandler);
  playState = null;
  document.getElementById('play-hud')?.remove();
  document.getElementById('btn-play').textContent = '▶️ 试玩';
  document.getElementById('btn-play').classList.remove('active');
  initCamera();  // 恢复摄像机
}

// 碰撞检测（原游戏逻辑）
function playCheckCollision(fish) {
  const r = fish.radius * fish.scale;
  const isInflatingMax = fish.scale >= 1.8 * 0.95;

  for (const obj of state.objects) {
    if (obj.type === 'rect') {
      // 矩形碰撞
      const cx = Math.max(obj.x - obj.w / 2, Math.min(fish.x, obj.x + obj.w / 2));
      const cy = Math.max(obj.y - obj.h / 2, Math.min(fish.y, obj.y + obj.h / 2));
      const dx = fish.x - cx, dy = fish.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < r) {
        const overlap = r - dist;
        let nx = dist > 0 ? dx / dist : 1, ny = dist > 0 ? dy / dist : 0;
        fish.x += nx * overlap;
        fish.y += ny * overlap;
        const speed = Math.sqrt(fish.vx * fish.vx + fish.vy * fish.vy);
        fish.vx = nx * speed * 0.8;
        fish.vy = ny * speed * 0.8;
        return;
      }
    } else if (obj.type === 'circle') {
      // 圆形碰撞
      const dx = fish.x - obj.x, dy = fish.y - obj.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const objRadius = obj.radius || 30;
      if (dist < r + objRadius) {
        const overlap = r + objRadius - dist;
        const nx = dx / dist, ny = dy / dist;
        fish.x += nx * overlap;
        fish.y += ny * overlap;
        const speed = Math.sqrt(fish.vx * fish.vx + fish.vy * fish.vy);
        fish.vx = nx * speed * 0.8;
        fish.vy = ny * speed * 0.8;
        // 伤害（膨胀到95%以上无敌）
        if (fish.invincible <= 0 && !isInflatingMax) {
          const dmg = 10 + (fish.scale - 1) * 40;
          fish.hp -= dmg;
          fish.invincible = 0.5;
          if (fish.hp <= 0) {
            fish.hp = 0;
            playState.phase = 'dead';
          }
        }
        return;
      }
    }
  }
}

function playLoop() {
  if (state.mode !== 'play' || !playState) return;

  const { fish, input } = playState;
  const dt = 1 / 60;

  // === 物理更新（原游戏逻辑）===
  const released = input.lastClick && !input.clicking;
  input.lastClick = input.clicking;

  const maxScale = 1.8;
  const inflateRate = (maxScale - 1) / 1.0;
  const deflateRate = (maxScale - 1) / 0.5;

  // 膨胀/收缩
  if (input.clicking) {
    fish.scale = Math.min(fish.scale + inflateRate * dt, maxScale);
    fish.rotation += fish.rotSpeed * dt;
  } else {
    fish.scale = Math.max(fish.scale - deflateRate * dt, 1.0);
  }
  fish.inflate = (fish.scale - 1) / (maxScale - 1) * fish.maxInflate;

  // 发射
  if (released && fish.inflate > 0.2) {
    const power = fish.inflate / fish.maxInflate;
    const dir = fish.rotation + Math.PI;
    fish.vx = Math.cos(dir) * fish.launchVel * power;
    fish.vy = Math.sin(dir) * fish.launchVel * power;
    fish.launchScale = fish.scale;
    fish.launchTime = 0;
    fish.waveAmp = power * 25;
    fish.inflate = 0;
    fish.scale = 1.0;
  }

  // 发射后缩放动画
  if (fish.launchScale > 1.01 && fish.launchTime < 2.0) {
    fish.launchTime += dt;
    const progress = Math.min(fish.launchTime / 2.0, 1.0);
    if (!input.clicking) {
      fish.scale = fish.launchScale * (1 - progress) + 1.0 * progress;
    } else {
      fish.launchScale = 1.0;
      fish.launchTime = 2.0;
    }
  }

  // 波动效果
  if (fish.waveAmp > 0) {
    fish.waveOffset += dt * 30;
    const wave = Math.sin(fish.waveOffset) * fish.waveAmp;
    const speed = Math.sqrt(fish.vx * fish.vx + fish.vy * fish.vy);
    if (speed > 10) {
      fish.x += (-fish.vy / speed) * wave * dt;
      fish.y += (fish.vx / speed) * wave * dt;
    }
    fish.waveAmp *= 0.97;
    if (fish.waveAmp < 0.5) fish.waveAmp = 0;
  }

  // 摩擦力
  fish.vx *= fish.friction;
  fish.vy *= fish.friction;
  const speed = Math.sqrt(fish.vx * fish.vx + fish.vy * fish.vy);
  if (speed < 5) { fish.vx = 0; fish.vy = 0; }

  // 旋转跟随速度方向
  if (speed > 10 && !input.clicking) {
    const targetRot = Math.atan2(fish.vy, fish.vx);
    let diff = targetRot - fish.rotation;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    fish.rotation += diff * 5 * dt;
  }

  // 移动
  fish.x += fish.vx * dt;
  fish.y += fish.vy * dt;
  if (fish.invincible > 0) fish.invincible -= dt;

  // 世界边界
  const m = fish.radius * fish.scale;
  if (fish.x < m) { fish.x = m; fish.vx = Math.abs(fish.vx) * 0.8; }
  if (fish.x > state.worldWidth - m) { fish.x = state.worldWidth - m; fish.vx = -Math.abs(fish.vx) * 0.8; }
  if (fish.y < m) { fish.y = m; fish.vy = Math.abs(fish.vy) * 0.8; }
  if (fish.y > state.worldHeight - m) { fish.y = state.worldHeight - m; fish.vy = -Math.abs(fish.vy) * 0.8; }

  // 碰撞检测
  playCheckCollision(fish);

  // 终点检测
  const end = state.objects.find(o => o.type === 'end');
  if (end && playState.phase === 'play') {
    const dx = fish.x - end.x, dy = fish.y - end.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < (end.radius || 40)) {
      playState.phase = 'win';
    }
  }

  // 死亡检测
  if (fish.hp <= 0 && playState.phase === 'play') {
    playState.phase = 'dead';
  }

  // === 更新摄像机 ===
  if (state.playCamera) {
    state.playCamera.x += (fish.x - state.playCamera.x) * 0.08;
    state.playCamera.y += (fish.y - state.playCamera.y) * 0.08;
  }

  // === 渲染 ===
  const prevOffset = { ...state.viewOffset };
  const prevScale = state.viewScale;

  if (state.playCamera) {
    state.viewOffset = {
      x: canvas.width / 2 - (state.playCamera.x - state.worldWidth / 2) * state.viewScale,
      y: canvas.height / 2 - (state.playCamera.y - state.worldHeight / 2) * state.viewScale
    };
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 背景
  ctx.fillStyle = '#000d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 边界
  drawWorldBounds();

  // 障碍物
  for (const obj of state.objects) {
    if (obj.type === 'circle' || obj.type === 'rect') {
      ctx.save();
      const sx = (obj.x - state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
      const sy = (obj.y - state.worldHeight / 2) * state.viewScale + state.viewOffset.y;
      if (obj.type === 'circle') {
        ctx.fillStyle = '#f33';
        ctx.beginPath(); ctx.arc(sx, sy, (obj.radius || 30) * state.viewScale, 0, Math.PI * 2); ctx.fill();
      } else {
        const rw = (obj.w || 60) * state.viewScale, rh = (obj.h || 40) * state.viewScale;
        ctx.fillStyle = 'rgba(220,60,0,0.4)';
        ctx.fillRect(sx - rw / 2, sy - rh / 2, rw, rh);
        ctx.strokeStyle = '#e84';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - rw / 2, sy - rh / 2, rw, rh);
      }
      ctx.restore();
    }
  }

  // 终点
  if (end) {
    ctx.save();
    const sx = (end.x - state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
    const sy = (end.y - state.worldHeight / 2) * state.viewScale + state.viewOffset.y;
    ctx.fillStyle = '#08f';
    ctx.beginPath(); ctx.arc(sx, sy, (end.radius || 40) * state.viewScale, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // 绘制鱼（原游戏绘制）
  ctx.save();
  const fishX = (fish.x - state.worldWidth / 2) * state.viewScale + state.viewOffset.x;
  const fishY = (fish.y - state.worldHeight / 2) * state.viewScale + state.viewOffset.y;
  ctx.translate(fishX, fishY);
  ctx.rotate(fish.rotation);
  const r = fish.radius * fish.scale * state.viewScale;

  // 无敌闪烁
  if (fish.invincible > 0 && Math.floor(fish.invincible * 10) % 2 === 0) ctx.globalAlpha = 0.5;

  // 颜色
  if (fish.hp <= 0) ctx.fillStyle = '#888';
  else if (input.clicking && fish.inflate > 0) ctx.fillStyle = '#ff0';
  else if (Math.sqrt(fish.vx * fish.vx + fish.vy * fish.vy) > 10) ctx.fillStyle = '#f60';
  else ctx.fillStyle = '#0f0';

  // 身体
  ctx.beginPath(); ctx.ellipse(0, 0, r * 1.3, r, 0, 0, Math.PI * 2); ctx.fill();
  // 尾巴
  ctx.beginPath();
  ctx.moveTo(-r * 0.8, 0);
  ctx.lineTo(-r * 1.8, -r * 0.5);
  ctx.lineTo(-r * 1.8, r * 0.5);
  ctx.closePath(); ctx.fill();
  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(r * 0.6, -r * 0.3, r * 0.25, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(r * 0.7, -r * 0.3, r * 0.12, 0, Math.PI * 2); ctx.fill();
  // 方向指针
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(r * 0.8, 0); ctx.lineTo(r * 1.5, 0); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(r * 1.5, 0); ctx.lineTo(r * 1.2, -r * 0.3);
  ctx.moveTo(r * 1.5, 0); ctx.lineTo(r * 1.2, r * 0.3);
  ctx.stroke();
  ctx.restore();

  // HP 条
  ctx.fillStyle = '#333';
  ctx.fillRect(10, 10, 200, 20);
  ctx.fillStyle = fish.hp > 30 ? '#0f0' : '#f00';
  ctx.fillRect(10, 10, 200 * (fish.hp / fish.maxHp), 20);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, 200, 20);
  ctx.fillStyle = '#fff';
  ctx.font = '14px Arial';
  ctx.fillText(`HP: ${Math.round(fish.hp)}/${fish.maxHp}`, 15, 26);

  // 状态提示
  if (playState.phase === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f0';
    ctx.font = '48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 通关！', canvas.width / 2, canvas.height / 2);
    ctx.font = '20px Arial';
    ctx.fillText('点击任意位置返回编辑器', canvas.width / 2, canvas.height / 2 + 40);
    ctx.textAlign = 'left';
    // 点击返回
    const clickHandler = () => {
      canvas.removeEventListener('click', clickHandler);
      stopPlayMode();
    };
    canvas.addEventListener('click', clickHandler);
    return;
  }

  if (playState.phase === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f00';
    ctx.font = '48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('💀 游戏结束', canvas.width / 2, canvas.height / 2);
    ctx.font = '20px Arial';
    ctx.fillText('点击重新开始', canvas.width / 2, canvas.height / 2 + 40);
    ctx.textAlign = 'left';
    // 点击重试
    const clickHandler = () => {
      canvas.removeEventListener('click', clickHandler);
      stopPlayMode();
      setTimeout(startPlayMode, 50);
    };
    canvas.addEventListener('click', clickHandler);
    return;
  }

  // 恢复视图
  state.viewOffset = prevOffset;
  state.viewScale = prevScale;

  requestAnimationFrame(playLoop);
}

// === 试玩按钮 ===
document.getElementById('btn-play')?.addEventListener('click', () => {
  if (state.mode === 'edit') {
    startPlayMode();
  } else {
    stopPlayMode();
  }
});

// === 初始化时开始渲染循环 ===
init = function() {
  // 初始化历史记录
  saveHistory();
  requestAnimationFrame(render);
};
init();
</script>
