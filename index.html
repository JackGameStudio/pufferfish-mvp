<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>弹弹河豚 MVP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
        }
        #info {
            position: fixed;
            top: 10px; left: 10px;
            color: #fff;
            font-size: 12px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 10;
        }
        #hp-bar {
            width: 120px; height: 12px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 5px;
        }
        #hp-fill {
            width: 100%; height: 100%;
            background: #0f0;
            transition: width 0.2s;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="info">
        <p style="font-size: 16px; font-weight: bold; color: #0af;">🐡 弹弹河豚 MVP</p>
        <p>FPS: <span id="fps">0</span></p>
        <p style="color: #ff6;">HP: <span id="hp">100</span></p>
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <p style="color: #0ff; margin-top: 5px;">点击河豚膨胀</p>
        <p style="color: #0ff;">松开弹射</p>
    </div>
    <script>
        // === canvas 全屏自适应（跟随屏幕比例）===
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

        // GAME_W/H 动态跟随屏幕，关卡坐标不变
        let GAME_W = window.innerWidth;
        let GAME_H = window.innerHeight;

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            GAME_W = window.innerWidth;
            GAME_H = window.innerHeight;
            canvas.style.width = GAME_W + 'px';
            canvas.style.height = GAME_H + 'px';
            canvas.width = Math.round(GAME_W * dpr);
            canvas.height = Math.round(GAME_H * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let lastTime = Date.now();
        let fps = 0, frameCount = 0;

        const LEVEL_W = 1200, LEVEL_H = 900; // 关卡实际大小（逻辑像素）

        // 关卡：星河漂流
        const level = {
            startX: 200, startY: 750,
            endX: 1000, endY: 100, endRadius: 40,
            obstacles: [
                { x: 280, y: 720, radius: 28 },
                { x: 350, y: 700, radius: 25 },
                { x: 420, y: 680, radius: 30 },
                { x: 500, y: 660, radius: 28 },
                { x: 580, y: 650, radius: 25 },
                { x: 320, y: 640, radius: 26 },
                { x: 400, y: 620, radius: 28 },
                { x: 480, y: 600, radius: 25 },
                { x: 560, y: 590, radius: 27 },
                { x: 640, y: 580, radius: 26 },
                { x: 700, y: 500, radius: 30 },
                { x: 650, y: 450, radius: 25 },
                { x: 500, y: 380, radius: 35 },
                { x: 550, y: 360, radius: 32 },
                { x: 520, y: 340, radius: 30 },
                { x: 570, y: 320, radius: 28 },
                { x: 700, y: 350, radius: 38 },
                { x: 750, y: 330, radius: 35 },
                { x: 720, y: 300, radius: 32 },
                { x: 600, y: 250, radius: 33 },
                { x: 650, y: 230, radius: 30 },
                { x: 630, y: 200, radius: 28 },
                { x: 800, y: 200, radius: 40 },
                { x: 900, y: 180, radius: 38 },
                { x: 850, y: 220, radius: 35 },
                { x: 920, y: 140, radius: 30 },
                { x: 780, y: 150, radius: 32 }
            ]
        };

        const camera = { x: 0, y: 0, tx: 0, ty: 0 };

        const MINIMAP_W = 140, MINIMAP_H = 105;
        const MINIMAP_MARGIN = 10; // 离边缘距离（PC）
        const MINIMAP_PAD = 15;    // 手机安全边距

        const state = { finished: false, gameOver: false };

        const fish = {
            x: 400, y: 550,
            radius: 20, vx: 0, vy: 0,
            scale: 1.0,
            inflate: 0, maxInflate: 1.0,
            launchVel: 900, friction: 0.992,
            rotation: -Math.PI / 2, rotSpeed: 6,
            hp: 100, maxHp: 100,
            invincible: 0,
            waveAmp: 0, waveOffset: 0,
            launchScale: 1.0, launchTime: 0
        };

        const input = { mouseDown: false, mouseX: 0, mouseY: 0, clicking: false, lastClick: false };

        // 事件
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            input.mouseX = e.clientX - rect.left;
            input.mouseY = e.clientY - rect.top;
            input.mouseDown = true;
            input.clicking = true;
            if (state.finished || state.gameOver) init();
        });
        canvas.addEventListener('mouseup', () => { input.mouseDown = false; input.clicking = false; });
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            input.mouseX = e.clientX - rect.left;
            input.mouseY = e.clientY - rect.top;
        });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.touches[0], rect = canvas.getBoundingClientRect();
            input.mouseX = t.clientX - rect.left;
            input.mouseY = t.clientY - rect.top;
            input.mouseDown = true;
            input.clicking = true;
            if (state.finished || state.gameOver) init();
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0], rect = canvas.getBoundingClientRect();
            input.mouseX = t.clientX - rect.left;
            input.mouseY = t.clientY - rect.top;
        });
        canvas.addEventListener('touchend', e => { e.preventDefault(); input.mouseDown = false; input.clicking = false; });

        function init() {
            fish.x = level.startX; fish.y = level.startY;
            fish.vx = 0; fish.vy = 0;
            fish.scale = 1.0; fish.inflate = 0;
            fish.rotation = -Math.PI / 2;
            fish.hp = fish.maxHp;
            fish.invincible = 0;
            fish.waveAmp = 0; fish.launchScale = 1.0; fish.launchTime = 0;
            state.finished = false; state.gameOver = false;
            // 重置镜头到起点
            camera.x = fish.x; camera.y = fish.y;
            camera.tx = fish.x; camera.ty = fish.y;
        }

        function checkCollision() {
            const r = fish.radius * fish.scale;
            for (let o of level.obstacles) {
                const dx = fish.x - o.x, dy = fish.y - o.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < r + o.radius && fish.invincible <= 0) {
                    const dmg = 10 + (fish.scale - 1) * 40;
                    fish.hp -= dmg;
                    fish.invincible = 0.5;
                    const overlap = r + o.radius - dist;
                    const nx = dx/dist, ny = dy/dist;
                    fish.x += nx * overlap; fish.y += ny * overlap;
                    const speed = Math.sqrt(fish.vx*fish.vx + fish.vy*fish.vy);
                    fish.vx = nx * speed * 0.8; fish.vy = ny * speed * 0.8;
                    playSound(150, 0.3, 'square');
                    if (fish.hp <= 0) { fish.hp = 0; state.gameOver = true; }
                    return;
                }
            }
        }

        function checkEnd() {
            const dx = fish.x - level.endX, dy = fish.y - level.endY;
            if (Math.sqrt(dx*dx + dy*dy) < level.endRadius) {
                state.finished = true;
                fish.vx = 0; fish.vy = 0;
                playSound(800, 0.3);
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f, d, t='sine') {
            try {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = f; osc.type = t;
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                osc.start(); osc.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        function update(dt) {
            if (fish.invincible > 0) fish.invincible -= dt;
            
            const released = input.lastClick && !input.clicking;
            input.lastClick = input.clicking;
            
            // 膨胀
            if (input.clicking) {
                fish.inflate = Math.min(fish.inflate + dt, fish.maxInflate);
                fish.rotation += fish.rotSpeed * dt;
            } else {
                fish.inflate = Math.max(fish.inflate - dt * 3, 0);
            }

            // 缩放：按下时快速响应，松开时缓慢缩小
            const targetScale = 1 + (fish.inflate / fish.maxInflate) * 0.8;
            // 关键修复：按下时用更快的 lerp，松开时用慢的 lerp
            const lerp = input.clicking ? 0.15 : (fish.inflate > 0 ? 0.08 : 0.025);
            fish.scale = fish.scale * (1-lerp) + targetScale * lerp;
            
            // 弹射
            if (released && fish.inflate > 0.2) {
                const power = fish.inflate / fish.maxInflate;
                const dir = fish.rotation + Math.PI;
                fish.vx = Math.cos(dir) * fish.launchVel * power;
                fish.vy = Math.sin(dir) * fish.launchVel * power;
                fish.launchScale = fish.scale;
                fish.launchTime = 0;
                fish.waveAmp = power * 25;
                fish.inflate = 0;
                playSound(400, 0.1);
            }
            
            // 弹射后渐进缩小（2秒完成）
            if (fish.launchScale > 1.01 && fish.launchTime < 2.0) {
                fish.launchTime += dt;
                const progress = Math.min(fish.launchTime / 2.0, 1.0);
                fish.scale = fish.launchScale * (1 - progress) + 1.0 * progress;
            }
            
            // 波浪抖动
            if (fish.waveAmp > 0) {
                fish.waveOffset += dt * 30;
                const wave = Math.sin(fish.waveOffset) * fish.waveAmp;
                const speed = Math.sqrt(fish.vx*fish.vx + fish.vy*fish.vy);
                if (speed > 10) {
                    fish.x += (-fish.vy / speed) * wave * dt;
                    fish.y += (fish.vx / speed) * wave * dt;
                }
                fish.waveAmp *= 0.97;
                if (fish.waveAmp < 0.5) fish.waveAmp = 0;
            }
            
            // 阻力
            fish.vx *= fish.friction; fish.vy *= fish.friction;
            
            const speed = Math.sqrt(fish.vx*fish.vx + fish.vy*fish.vy);
            if (speed < 5) { fish.vx = 0; fish.vy = 0; }
            
            // 运动时旋转跟随方向
            if (speed > 10 && !input.clicking) {
                const targetRot = Math.atan2(fish.vy, fish.vx);
                let diff = targetRot - fish.rotation;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                fish.rotation += diff * 5 * dt;
            }
            
            fish.x += fish.vx * dt; fish.y += fish.vy * dt;
            
            // 边界（关卡范围）
            const m = fish.radius * fish.scale;
            if (fish.x < m) { fish.x = m; fish.vx = Math.abs(fish.vx) * 0.8; }
            if (fish.x > LEVEL_W - m) { fish.x = LEVEL_W - m; fish.vx = -Math.abs(fish.vx) * 0.8; }
            if (fish.y < m) { fish.y = m; fish.vy = Math.abs(fish.vy) * 0.8; }
            if (fish.y > LEVEL_H - m) { fish.y = LEVEL_H - m; fish.vy = -Math.abs(fish.vy) * 0.8; }

            // 镜头跟随（平滑）
            camera.tx = fish.x; camera.ty = fish.y;
            camera.x += (camera.tx - camera.x) * 0.08;
            camera.y += (camera.ty - camera.y) * 0.08;
            
            document.getElementById('hp').textContent = Math.round(fish.hp);
            document.getElementById('hp-fill').style.width = (fish.hp/fish.maxHp*100) + '%';
            document.getElementById('hp-fill').style.background = fish.hp > 30 ? '#0f0' : '#f00';
        }

        function render() {
            // 镜头偏移：鱼居中
            const ox = GAME_W / 2 - camera.x;
            const oy = GAME_H / 2 - camera.y;

            ctx.fillStyle = '#001030';
            ctx.fillRect(0, 0, GAME_W, GAME_H);

            ctx.save();
            ctx.translate(ox, oy);

            // 关卡边界
            ctx.strokeStyle = 'rgba(0,100,200,0.4)'; ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, LEVEL_W, LEVEL_H);

            // 起点
            ctx.fillStyle = '#0f0';
            ctx.beginPath(); ctx.arc(level.startX, level.startY, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
            ctx.fillText('START', level.startX, level.startY + 25);

            // 终点
            ctx.fillStyle = '#08f';
            ctx.beginPath(); ctx.arc(level.endX, level.endY, level.endRadius, 0, Math.PI*2); ctx.fill();
            ctx.fillText('END', level.endX, level.endY + level.endRadius + 15);

            // 障碍
            ctx.fillStyle = '#f00';
            for (let o of level.obstacles) {
                ctx.beginPath(); ctx.arc(o.x, o.y, o.radius, 0, Math.PI*2); ctx.fill();
            }

            // 鱼
            ctx.save();
            ctx.translate(fish.x, fish.y);
            ctx.rotate(fish.rotation);
            const r = fish.radius * fish.scale;

            if (fish.invincible > 0 && Math.floor(fish.invincible * 10) % 2 === 0) ctx.globalAlpha = 0.5;

            if (fish.hp <= 0) ctx.fillStyle = '#888';
            else if (input.clicking && fish.inflate > 0) ctx.fillStyle = '#ff0';
            else if (Math.sqrt(fish.vx*fish.vx + fish.vy*fish.vy) > 10) ctx.fillStyle = '#f60';
            else ctx.fillStyle = '#0f0';

            // 身体
            ctx.beginPath(); ctx.ellipse(0, 0, r*1.3, r, 0, 0, Math.PI*2); ctx.fill();
            // 尾巴
            ctx.beginPath();
            ctx.moveTo(-r*0.8, 0);
            ctx.lineTo(-r*1.8, -r*0.5);
            ctx.lineTo(-r*1.8, r*0.5);
            ctx.closePath(); ctx.fill();
            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(r*0.6, -r*0.3, r*0.25, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(r*0.7, -r*0.3, r*0.12, 0, Math.PI*2); ctx.fill();
            // 方向指针
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(r*0.8, 0); ctx.lineTo(r*1.5, 0); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(r*1.5, 0);
            ctx.lineTo(r*1.2, -r*0.3);
            ctx.moveTo(r*1.5, 0);
            ctx.lineTo(r*1.2, r*0.3);
            ctx.stroke();
            ctx.restore();

            // 膨胀进度条（屏幕空间，避免位置乱跳）
            ctx.restore(); // 退出世界坐标

            if (input.clicking && fish.inflate > 0) {
                const sx = GAME_W / 2 + (fish.x - camera.x);
                const sy = GAME_H / 2 + (fish.y - camera.y);
                const rVis = fish.radius * fish.scale;
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.fillRect(sx - 50, sy + rVis * 2.5, 100, 8);
                ctx.fillStyle = '#ff0';
                ctx.fillRect(sx - 50, sy + rVis * 2.5, 100 * (fish.inflate / fish.maxInflate), 8);
            }

            // 小地图
            const mmX = isMobile ? MINIMAP_PAD : GAME_W - MINIMAP_W - MINIMAP_MARGIN;
            const mmY = isMobile ? MINIMAP_PAD : GAME_H - MINIMAP_H - MINIMAP_MARGIN;
            const sx = LEVEL_W / MINIMAP_W, sy = LEVEL_H / MINIMAP_H;

            ctx.fillStyle = 'rgba(0,20,50,0.85)';
            ctx.fillRect(mmX - 2, mmY - 2, MINIMAP_W + 4, MINIMAP_H + 4);
            ctx.strokeStyle = '#0af'; ctx.lineWidth = 1;
            ctx.strokeRect(mmX - 2, mmY - 2, MINIMAP_W + 4, MINIMAP_H + 4);

            // 关卡边界线
            ctx.strokeStyle = 'rgba(0,100,200,0.4)'; ctx.lineWidth = 0.5;
            ctx.strokeRect(mmX, mmY, MINIMAP_W, MINIMAP_H);

            // 障碍
            ctx.fillStyle = 'rgba(255,60,60,0.7)';
            for (let o of level.obstacles) {
                ctx.beginPath();
                ctx.arc(mmX + o.x / sx, mmY + o.y / sy, Math.max(o.radius / sx, 3), 0, Math.PI*2);
                ctx.fill();
            }

            // 起点终点
            ctx.fillStyle = '#0f0';
            ctx.beginPath(); ctx.arc(mmX + level.startX / sx, mmY + level.startY / sy, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#08f';
            ctx.beginPath(); ctx.arc(mmX + level.endX / sx, mmY + level.endY / sy, Math.max(level.endRadius / sx, 3), 0, Math.PI*2); ctx.fill();

            // 鱼（高亮）
            ctx.fillStyle = '#ffff00';
            ctx.beginPath(); ctx.arc(mmX + fish.x / sx, mmY + fish.y / sy, 4, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
            ctx.stroke();

            // 视野框
            const vpX = mmX + (GAME_W / 2 - camera.x) / sx;
            const vpY = mmY + (GAME_H / 2 - camera.y) / sy;
            const vpW = GAME_W / sx, vpH = GAME_H / sy;
            ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.5;
            ctx.strokeRect(vpX - vpW/2, vpY - vpH/2, vpW, vpH);

            // 状态文本
            ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
            if (state.finished) {
                ctx.fillStyle = '#0f0';
                ctx.fillText('🎉 过关！', GAME_W/2, GAME_H/2);
                ctx.font = '16px Arial'; ctx.fillStyle = '#fff';
                ctx.fillText('点击重新开始', GAME_W/2, GAME_H/2 + 40);
            } else if (state.gameOver) {
                ctx.fillStyle = '#f00';
                ctx.fillText('💀 游戏结束', GAME_W/2, GAME_H/2);
                ctx.font = '16px Arial'; ctx.fillStyle = '#fff';
                ctx.fillText('点击重新开始', GAME_W/2, GAME_H/2 + 40);
            }

            ctx.strokeStyle = '#0af'; ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, GAME_W, GAME_H);
        }

        function loop() {
            const now = Date.now(), dt = (now - lastTime) / 1000;
            lastTime = now;
            frameCount++;
            if (frameCount % 10 === 0) {
                fps = Math.round(1 / dt);
                document.getElementById('fps').textContent = fps;
            }
            
            update(dt);
            if (!state.finished && !state.gameOver) { checkCollision(); checkEnd(); }
            render();
            requestAnimationFrame(loop);
        }

        init();
        loop();
    </script>
</body>
</html>
