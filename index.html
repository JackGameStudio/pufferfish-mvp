<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹弹河豚 MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="info">
        <p style="font-size: 16px; font-weight: bold; color: #0af;">🐡 弹弹河豚 MVP</p>
        <p>FPS: <span id="fps">0</span></p>
        <p style="color: #0ff;">按住空格：膨胀+旋转</p>
        <p style="color: #0ff;">松开空格：向尾巴弹射</p>
        <p style="color: #ff0;">目标：到达蓝色终点</p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const game = {
            running: true,
            deltaTime: 0,
            lastTime: Date.now(),
            fps: 0,
            frameCount: 0
        };

        const level = {
            startX: 400,
            startY: 550,
            endX: 400,
            endY: 50,
            endRadius: 40,
            obstacles: [
                { x: 200, y: 200, radius: 30 },
                { x: 400, y: 300, radius: 30 },
                { x: 600, y: 200, radius: 30 }
            ]
        };

        const gameState = {
            started: false,
            finished: false,
            hitObstacle: false,
            hitTime: 0
        };

        const pufferfish = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            vx: 0,
            vy: 0,
            scale: 1.0,
            inflateTime: 0,
            maxInflateTime: 1.0,        // 缩短到 1 秒
            deflateSpeed: 3.0,          // 加快缩小速度
            launchVelocity: 700,        // 调整弹射速度
            friction: 0.985,            // 调整水的阻力
            rotation: -Math.PI / 2,
            rotationSpeed: 4            // 加快旋转速度
        };

        const input = {
            keys: {},
            touchX: null,
            touchY: null,
            touching: false,
            space: false,
            spacePressed: false,
            spacePressedLastFrame: false
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                input.space = true;
                input.spacePressed = true;
                if (gameState.finished || gameState.hitObstacle) {
                    initLevel();
                }
                e.preventDefault();
            }
            input.keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === ' ') {
                input.space = false;
                e.preventDefault();
            }
            input.keys[e.key] = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            input.touchX = touch.clientX - rect.left;
            input.touchY = touch.clientY - rect.top;
            input.touching = true;
            input.space = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            input.touchX = touch.clientX - rect.left;
            input.touchY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchend', (e) => {
            input.touching = false;
            input.space = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            input.touchX = e.clientX - rect.left;
            input.touchY = e.clientY - rect.top;
        });

        function initLevel() {
            pufferfish.x = level.startX;
            pufferfish.y = level.startY;
            pufferfish.vx = 0;
            pufferfish.vy = 0;
            pufferfish.scale = 1.0;
            pufferfish.isLaunched = false;
            pufferfish.inflateTime = 0;
            pufferfish.rotation = -Math.PI / 2;
            
            gameState.started = false;
            gameState.finished = false;
            gameState.hitObstacle = false;
            gameState.hitTime = 0;
        }

        function checkCollisions() {
            const puffRadius = pufferfish.radius * pufferfish.scale;
            
            for (let obstacle of level.obstacles) {
                const dx = pufferfish.x - obstacle.x;
                const dy = pufferfish.y - obstacle.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < puffRadius + obstacle.radius) {
                    gameState.hitObstacle = true;
                    gameState.hitTime = 0.5;
                    onHit();
                    return;
                }
            }
        }

        function checkEndZone() {
            const dx = pufferfish.x - level.endX;
            const dy = pufferfish.y - level.endY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < level.endRadius) {
                gameState.finished = true;
                onFinish();
            }
        }

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, duration, type = 'sine') {
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = frequency;
                osc.type = type;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + duration);
            } catch (e) {}
        }

        function onLaunch() {
            playSound(400, 0.1);
        }

        function onHit() {
            playSound(200, 0.2);
        }

        function onFinish() {
            playSound(800, 0.3);
        }

        function gameLoop() {
            const now = Date.now();
            game.deltaTime = (now - game.lastTime) / 1000;
            game.lastTime = now;
            
            game.frameCount++;
            if (game.frameCount % 10 === 0) {
                game.fps = Math.round(1 / game.deltaTime);
                document.getElementById('fps').textContent = game.fps;
            }
            
            update(game.deltaTime);
            
            // 碰撞检测（任何移动都可能碰撞）
            checkCollisions();
            checkEndZone();
            
            if (gameState.hitObstacle) {
                gameState.hitTime -= game.deltaTime;
                if (gameState.hitTime <= 0) {
                    gameState.hitObstacle = false;
                    initLevel();
                }
            }
            
            render();
            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            const speed = 200;
            
            const spaceReleased = input.spacePressedLastFrame && !input.space;
            input.spacePressedLastFrame = input.space;
            
            // 膨胀逻辑
            if (input.space) {
                pufferfish.inflateTime = Math.min(
                    pufferfish.inflateTime + dt,
                    pufferfish.maxInflateTime
                );
                // 充气时旋转
                pufferfish.rotation += pufferfish.rotationSpeed * dt;
            } else {
                pufferfish.inflateTime = Math.max(
                    pufferfish.inflateTime - dt * pufferfish.deflateSpeed,
                    0
                );
            }
            
            pufferfish.scale = 1.0 + (pufferfish.inflateTime / pufferfish.maxInflateTime) * 0.5;
            
            // 松手弹射：向尾巴方向
            if (spaceReleased && pufferfish.inflateTime > 0.2) {
                const launchPower = pufferfish.inflateTime / pufferfish.maxInflateTime;
                
                // 头的方向 = rotation，尾巴方向 = rotation + π
                const tailDirection = pufferfish.rotation + Math.PI;
                pufferfish.vx = Math.cos(tailDirection) * pufferfish.launchVelocity * launchPower;
                pufferfish.vy = Math.sin(tailDirection) * pufferfish.launchVelocity * launchPower;
                
                pufferfish.inflateTime = 0;
                onLaunch();
            }
            
            // 水的阻力（始终应用）
            pufferfish.vx *= pufferfish.friction;
            pufferfish.vy *= pufferfish.friction;
            
            // 速度太慢时归零
            const currentSpeed = Math.sqrt(pufferfish.vx * pufferfish.vx + pufferfish.vy * pufferfish.vy);
            if (currentSpeed < 5) {
                pufferfish.vx = 0;
                pufferfish.vy = 0;
            }
            
            pufferfish.x += pufferfish.vx * dt;
            pufferfish.y += pufferfish.vy * dt;
            
            const margin = pufferfish.radius * pufferfish.scale;
            
            if (pufferfish.x - margin < 0) {
                pufferfish.x = margin;
                pufferfish.vx = Math.abs(pufferfish.vx) * 0.8;
            } else if (pufferfish.x + margin > canvas.width) {
                pufferfish.x = canvas.width - margin;
                pufferfish.vx = -Math.abs(pufferfish.vx) * 0.8;
            }
            
            if (pufferfish.y - margin < 0) {
                pufferfish.y = margin;
                pufferfish.vy = Math.abs(pufferfish.vy) * 0.8;
            } else if (pufferfish.y + margin > canvas.height) {
                pufferfish.y = canvas.height - margin;
                pufferfish.vy = -Math.abs(pufferfish.vy) * 0.8;
            }
        }

        function render() {
            ctx.fillStyle = '#001030';  // 深蓝色背景（水下感）
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制起点
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(level.startX, level.startY, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制终点
            ctx.fillStyle = '#0088ff';
            ctx.beginPath();
            ctx.arc(level.endX, level.endY, level.endRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制障碍物
            ctx.fillStyle = '#ff0000';
            for (let obstacle of level.obstacles) {
                ctx.beginPath();
                ctx.arc(obstacle.x, obstacle.y, obstacle.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 绘制河豚（有头和尾巴）
            ctx.save();
            ctx.translate(pufferfish.x, pufferfish.y);
            ctx.rotate(pufferfish.rotation);
            
            const radius = pufferfish.radius * pufferfish.scale;
            
            // 碰撞时闪烁
            if (gameState.hitObstacle && Math.floor(gameState.hitTime * 10) % 2 === 0) {
                ctx.fillStyle = '#ff0000';
            } else {
                ctx.fillStyle = pufferfish.isLaunched ? '#ff6600' : (pufferfish.inflateTime > 0 ? '#ffff00' : '#00ff00');
            }
            
            // 绘制身体（椭圆）
            ctx.beginPath();
            ctx.ellipse(0, 0, radius * 1.3, radius, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制尾巴（三角形，在后面）
            ctx.beginPath();
            ctx.moveTo(-radius * 0.8, 0);
            ctx.lineTo(-radius * 1.8, -radius * 0.5);
            ctx.lineTo(-radius * 1.8, radius * 0.5);
            ctx.closePath();
            ctx.fill();
            
            // 绘制眼睛
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(radius * 0.6, -radius * 0.3, radius * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(radius * 0.7, -radius * 0.3, radius * 0.12, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制方向指示器（指针）
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(radius * 0.8, 0);
            ctx.lineTo(radius * 1.5, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(radius * 1.5, 0);
            ctx.lineTo(radius * 1.2, -radius * 0.3);
            ctx.moveTo(radius * 1.5, 0);
            ctx.lineTo(radius * 1.2, radius * 0.3);
            ctx.stroke();
            
            ctx.restore();
            
            // 绘制膨胀进度条
            if (!pufferfish.isLaunched && pufferfish.inflateTime > 0) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(pufferfish.x - 50, pufferfish.y + radius * 2, 100, 10);
                ctx.fillStyle = '#ffff00';
                const progress = pufferfish.inflateTime / pufferfish.maxInflateTime;
                ctx.fillRect(pufferfish.x - 50, pufferfish.y + radius * 2, 100 * progress, 10);
            }
            
            // 绘制状态文本
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            
            if (gameState.finished) {
                ctx.fillStyle = '#00ff00';
                ctx.fillText('🎉 过关！', canvas.width / 2, canvas.height / 2);
                ctx.font = '16px Arial';
                ctx.fillStyle = '#fff';
                ctx.fillText('按空格重新开始', canvas.width / 2, canvas.height / 2 + 40);
            } else if (gameState.hitObstacle) {
                ctx.fillStyle = '#ff0000';
                ctx.fillText('💥 撞到障碍物！', canvas.width / 2, canvas.height / 2);
            }
            
            // 绘制边界
            ctx.strokeStyle = '#0af';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        initLevel();
        gameLoop();
    </script>
</body>
</html>
