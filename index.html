<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹弹河豚 MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="info">
        <p>Day 4: 弹射物理</p>
        <p>FPS: <span id="fps">0</span></p>
        <p>控制: 空格膨胀，松开弹射</p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        const game = {
            running: true,
            deltaTime: 0,
            lastTime: Date.now(),
            fps: 0,
            frameCount: 0
        };

        // 河豚对象
        const pufferfish = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            vx: 0,
            vy: 0,
            scale: 1.0,
            inflating: false,
            inflateTime: 0,
            maxInflateTime: 1.2,  // 最大膨胀时间（秒）
            deflateSpeed: 2.0,    // 缩小速度倍数
            // 弹射相关
            isLaunched: false,
            launchVelocity: 800,  // px/s
            gravity: 6.0,         // 水下重力
            airResistance: 0.98   // 空气阻力
        };

        // 输入状态
        const input = {
            keys: {},
            touchX: null,
            touchY: null,
            touching: false,
            space: false,
            spacePressed: false,
            spacePressedLastFrame: false
        };

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                input.space = true;
                input.spacePressed = true;
                e.preventDefault();
            }
            input.keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === ' ') {
                input.space = false;
                e.preventDefault();
            }
            input.keys[e.key] = false;
        });

        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            input.touchX = touch.clientX - rect.left;
            input.touchY = touch.clientY - rect.top;
            input.touching = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            input.touchX = touch.clientX - rect.left;
            input.touchY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchend', (e) => {
            input.touching = false;
        });

        // 鼠标事件（用于桌面测试）
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            input.touchX = e.clientX - rect.left;
            input.touchY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', (e) => {
            input.touching = true;
        });

        canvas.addEventListener('mouseup', (e) => {
            input.touching = false;
        });

        // 游戏循环
        function gameLoop() {
            const now = Date.now();
            game.deltaTime = (now - game.lastTime) / 1000;
            game.lastTime = now;
            
            // 更新 FPS
            game.frameCount++;
            if (game.frameCount % 10 === 0) {
                game.fps = Math.round(1 / game.deltaTime);
                document.getElementById('fps').textContent = game.fps;
14 }
            
            // 更新
            update(game.deltaTime);
            
            // 渲染
            render();
            
            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            const speed = 300; // px/s
            
            // 检测空格释放（从按下到松开）
            const spaceReleased = input.spacePressedLastFrame && !input.space;
            input.spacePressedLastFrame = input.space;
            
            // 如果还没弹射，处理膨胀和蓄力
            if (!pufferfish.isLaunched) {
                // 膨胀更新
                if (input.space) {
                    pufferfish.inflateTime = Math.min(
                        pufferfish.inflateTime + dt,
                        pufferfish.maxInflateTime
                    );
                } else {
                    pufferfish.inflateTime = Math.max(
                        pufferfish.inflateTime - dt * pufferfish.deflateSpeed,
                        0
                    );
                }
                
                pufferfish.scale = 1.0 + (pufferfish.inflateTime / pufferfish.maxInflateTime) * 0.5;
                
                // 空格释放时弹射
                if (spaceReleased && pufferfish.inflateTime > 0.3) {
                    pufferfish.isLaunched = true;
                    
                    // 计算弹射方向（向上）
                    const launchPower = pufferfish.inflateTime / pufferfish.maxInflateTime;
                    pufferfish.vy = -pufferfish.launchVelocity * launchPower;
                    pufferfish.vx = 0;
                    
                    pufferfish.inflateTime = 0;
                }
                
                // 未弹射时的移动控制
                const speedMultiplier = pufferfish.inflateTime > 0 ? 0.5 : 1.0;
                
                // 键盘控制
                if (input.keys['ArrowUp'] || input.keys['w']) {
                    pufferfish.vy = -speed * speedMultiplier;
                } else if (input.keys['ArrowDown'] || input.keys['s']) {
                    pufferfish.vy = speed * speedMultiplier;
                } else {
                    pufferfish.vy = 0;
                }
                
                if (input.keys['ArrowLeft'] || input.keys['a']) {
                    pufferfish.vx = -speed * speedMultiplier;
                } else if (input.keys['ArrowRight'] || input.keys['d']) {
                    pufferfish.vx = speed * speedMultiplier;
                } else {
                    pufferfish.vx = 0;
                }
                
                // 触摸控制（指向目标）
                if (input.touching && input.touchX !== null) {
                    const dx = input.touchX - pufferfish.x;
                    const dy = input.touchY - pufferfish.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 10) {
                        pufferfish.vx = (dx / dist) * speed * speedMultiplier;
                        pufferfish.vy = (dy / dist) * speed * speedMultiplier;
                    }
                }
            } else {
                // 弹射中：应用重力和空气阻力
                pufferfish.vy += pufferfish.gravity;
                pufferfish.vx *= pufferfish.airResistance;
                pufferfish.vy *= pufferfish.airResistance;
            }
            
            // 更新位置
            pufferfish.x += pufferfish.vx * dt;
            pufferfish.y += pufferfish.vy * dt;
            
            // 碰撞检测和反弹
            const margin = pufferfish.radius * pufferfish.scale;
            
            // 左右边界
            if (pufferfish.x - margin < 0) {
                pufferfish.x = margin;
                pufferfish.vx = Math.abs(pufferfish.vx) * 0.8;  // 反弹并减速
            } else if (pufferfish.x + margin > canvas.width) {
                pufferfish.x = canvas.width - margin;
                pufferfish.vx = -Math.abs(pufferfish.vx) * 0.8;
            }
            
            // 上下边界
            if (pufferfish.y - margin < 0) {
                pufferfish.y = margin;
                pufferfish.vy = Math.abs(pufferfish.vy) * 0.8;
            } else if (pufferfish.y + margin > canvas.height) {
                pufferfish.y = canvas.height - margin;
                pufferfish.vy = -Math.abs(pufferfish.vy) * 0.8;
            }
        }

        function render() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制河豚
            if (pufferfish.isLaunched) {
                ctx.fillStyle = '#ff6600';  // 橙色表示弹射中
            } else {
                ctx.fillStyle = pufferfish.inflateTime > 0 ? '#ffff00' : '#00ff00';
            }
            ctx.beginPath();
            ctx.arc(pufferfish.x, pufferfish.y, pufferfish.radius * pufferfish.scale, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制膨胀进度条（仅未弹射时）
            if (!pufferfish.isLaunched) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(10, 50, 200, 20);
                ctx.fillStyle = '#ffff00';
                const progress = pufferfish.inflateTime / pufferfish.maxInflateTime;
                ctx.fillRect(10, 50, 200 * progress, 20);
            }
            
            // 绘制速度指示
            ctx.fillStyle = '#0ff';
            ctx.font = '12px Arial';
            ctx.fillText(`VX: ${pufferfish.vx.toFixed(0)} VY: ${pufferfish.vy.toFixed(0)}`, 10, 90);
            
            // 绘制边界
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
