<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹弹河豚 MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="info">
        <p>Day 5: 测试关卡</p>
        <p>FPS: <span id="fps">0</span></p>
        <p>控制: 空格膨胀，松开弹射</p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        const game = {
            running: true,
            deltaTime: 0,
            lastTime: Date.now(),
            fps: 0,
            frameCount: 0
        };

        // 关卡定义
        const level = {
            startX: 400,
            startY: 550,
            endX: 400,
            endY: 50,
            endRadius: 40,
            obstacles: [
                { x: 200, y: 200, radius: 30 },
                { x: 400, y: 300, radius: 30 },
                { x: 600, y: 200, radius: 30 }
            ]
        };

        // 游戏状态
        const gameState = {
            started: false,
            finished: false,
            hitObstacle: false,
            hitTime: 0
        };

        // 河豚对象
        const pufferfish = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            vx: 0,
            vy: 0,
            scale: 1.0,
            inflating: false,
            inflateTime: 0,
            maxInflateTime: 1.2,
            deflateSpeed: 2.0,
            isLaunched: false,
            launchVelocity: 800,
            gravity: 6.0,
            airResistance: 0.98
        };

        // 输入状态
        const input = {
            keys: {},
            touchX: null,
            touchY: null,
            touching: false,
            space: false,
            spacePressed: false,
            spacePressedLastFrame: false
        };

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                input.space = true;
                input.spacePressed = true;
                e.preventDefault();
            }
            input.keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === ' ') {
                input.space = false;
                e.preventDefault();
            }
            input.keys[e.key] = false;
        });

        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            input.touchX = touch.clientX - rect.left;
            input.touchY = touch.clientY - rect.top;
            input.touching = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            input.touchX = touch.clientX - rect.left;
            input.touchY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchend', (e) => {
            input.touching = false;
        });

        // 鼠标事件
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            input.touchX = e.clientX - rect.left;
            input.touchY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', (e) => {
            input.touching = true;
        });

        canvas.addEventListener('mouseup', (e) => {
            input.touching = false;
        });

        // 初始化关卡
        function initLevel() {
            pufferfish.x = level.startX;
            pufferfish.y = level.startY;
            pufferfish.vx = 0;
            pufferfish.vy = 0;
            pufferfish.scale = 1.0;
            pufferfish.isLaunched = false;
            pufferfish.inflateTime = 0;
            
            gameState.started = false;
            gameState.finished = false;
            gameState.hitObstacle = false;
            gameState.hitTime = 0;
        }

        // 碰撞检测
        function checkCollisions() {
            const puffRadius = pufferfish.radius * pufferfish.scale;
            
            for (let obstacle of level.obstacles) {
                const dx = pufferfish.x - obstacle.x;
                const dy = pufferfish.y - obstacle.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < puffRadius + obstacle.radius) {
                    gameState.hitObstacle = true;
                    gameState.hitTime = 0.5;
                    return;
                }
            }
        }

        function checkEndZone() {
            const dx = pufferfish.x - level.endX;
            const dy = pufferfish.y - level.endY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < level.endRadius) {
                gameState.finished = true;
            }
        }

        // 游戏循环
        function gameLoop() {
            const now = Date.now();
            game.deltaTime = (now - game.lastTime) / 1000;
            game.lastTime = now;
            
            // 更新 FPS
            game.frameCount++;
            if (game.frameCount % 10 === 0) {
                game.fps = Math.round(1 / game.deltaTime);
                document.getElementById('fps').textContent = game.fps;
            }
            
            // 更新
            update(game.deltaTime);
            
            // 碰撞检测
            if (pufferfish.isLaunched) {
                checkCollisions();
                checkEndZone();
            }
            
            // 碰撞闪烁计时
            if (gameState.hitObstacle) {
                gameState.hitTime -= game.deltaTime;
                if (gameState.hitTime <= 0) {
                    gameState.hitObstacle = false;
                    initLevel();
                }
            }
            
            // 渲染
            render();
            
            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            const speed = 300;
            
            const spaceReleased = input.spacePressedLastFrame && !input.space;
            input.spacePressedLastFrame = input.space;
            
            if (!pufferfish.isLaunched) {
                if (input.space) {
                    pufferfish.inflateTime = Math.min(
                        pufferfish.inflateTime + dt,
                        pufferfish.maxInflateTime
                    );
                } else {
                    pufferfish.inflateTime = Math.max(
                        pufferfish.inflateTime - dt * pufferfish.deflateSpeed,
                        0
                    );
                }
                
                pufferfish.scale = 1.0 + (pufferfish.inflateTime / pufferfish.maxInflateTime) * 0.5;
                
                if (spaceReleased && pufferfish.inflateTime > 0.3) {
                    pufferfish.isLaunched = true;
                    const launchPower = pufferfish.inflateTime / pufferfish.maxInflateTime;
                    pufferfish.vy = -pufferfish.launchVelocity * launchPower;
                    pufferfish.vx = 0;
                    pufferfish.inflateTime = 0;
                }
                
                const speedMultiplier = pufferfish.inflateTime > 0 ? 0.5 : 1.0;
                
                if (input.keys['ArrowUp'] || input.keys['w']) {
                    pufferfish.vy = -speed * speedMultiplier;
                } else if (input.keys['ArrowDown'] || input.keys['s']) {
                    pufferfish.vy = speed * speedMultiplier;
                } else {
                    pufferfish.vy = 0;
                }
                
                if (input.keys['ArrowLeft'] || input.keys['a']) {
                    pufferfish.vx = -speed * speedMultiplier;
                } else if (input.keys['ArrowRight'] || input.keys['d']) {
                    pufferfish.vx = speed * speedMultiplier;
                } else {
                    pufferfish.vx = 0;
                }
                
                if (input.touching && input.touchX !== null) {
                    const dx = input.touchX - pufferfish.x;
                    const dy = input.touchY - pufferfish.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 10) {
                        pufferfish.vx = (dx / dist) * speed * speedMultiplier;
                        pufferfish.vy = (dy / dist) * speed * speedMultiplier;
                    }
                }
            } else {
                pufferfish.vy += pufferfish.gravity;
                pufferfish.vx *= pufferfish.airResistance;
                pufferfish.vy *= pufferfish.airResistance;
            }
            
            pufferfish.x += pufferfish.vx * dt;
            pufferfish.y += pufferfish.vy * dt;
            
            const margin = pufferfish.radius * pufferfish.scale;
            
            if (pufferfish.x - margin < 0) {
                pufferfish.x = margin;
                pufferfish.vx = Math.abs(pufferfish.vx) * 0.8;
            } else if (pufferfish.x + margin > canvas.width) {
                pufferfish.x = canvas.width - margin;
                pufferfish.vx = -Math.abs(pufferfish.vx) * 0.8;
            }
            
            if (pufferfish.y - margin < 0) {
                pufferfish.y = margin;
                pufferfish.vy = Math.abs(pufferfish.vy) * 0.8;
            } else if (pufferfish.y + margin > canvas.height) {
                pufferfish.y = canvas.height - margin;
                pufferfish.vy = -Math.abs(pufferfish.vy) * 0.8;
            }
        }

        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制起点
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(level.startX, level.startY, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制终点
            ctx.fillStyle = '#0000ff';
            ctx.beginPath();
            ctx.arc(level.endX, level.endY, level.endRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制障碍物
            ctx.fillStyle = '#ff0000';
            for (let obstacle of level.obstacles) {
                ctx.beginPath();
                ctx.arc(obstacle.x, obstacle.y, obstacle.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 绘制河豚（碰撞时闪烁）
            if (gameState.hitObstacle && Math.floor(gameState.hitTime * 10) % 2 === 0) {
                ctx.fillStyle = '#ff0000';
            } else {
                ctx.fillStyle = pufferfish.isLaunched ? '#ff6600' : (pufferfish.inflateTime > 0 ? '#ffff00' : '#00ff00');
            }
            ctx.beginPath();
            ctx.arc(pufferfish.x, pufferfish.y, pufferfish.radius * pufferfish.scale, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制状态文本
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            
            if (gameState.finished) {
                ctx.fillStyle = '#00ff00';
                ctx.fillText('🎉 过关！', canvas.width / 2, canvas.height / 2);
                ctx.font = '14px Arial';
                ctx.fillText('按空格重新开始', canvas.width / 2, canvas.height / 2 + 30);
            } else if (gameState.hitObstacle) {
                ctx.fillStyle = '#ff0000';
                ctx.fillText('💥 撞到障碍物！', canvas.width / 2, canvas.height / 2);
                ctx.font = '14px Arial';
                ctx.fillText('重新开始中...', canvas.width / 2, canvas.height / 2 + 30);
            }
            
            // 绘制边界
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        // 启动游戏
        initLevel();
        gameLoop();
    </script>
</body>
</html>
