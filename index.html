<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>弹弹河豚 MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            touch-action: none;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
            display: block;
            cursor: pointer;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 12px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            min-width: 150px;
        }
        #hp-bar {
            width: 120px;
            height: 12px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 5px;
        }
        #hp-fill {
            width: 100%;
            height: 100%;
            background: #0f0;
            transition: width 0.2s;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="info">
        <p style="font-size: 16px; font-weight: bold; color: #0af;">🐡 弹弹河豚 MVP</p>
        <p>FPS: <span id="fps">0</span></p>
        <p style="color: #ff6;">HP: <span id="hp">100</span></p>
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <p style="color: #0ff; margin-top: 5px;">点击河豚膨胀</p>
        <p style="color: #0ff;">松开弹射</p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const game = {
            deltaTime: 0,
            lastTime: Date.now(),
            fps: 0,
            frameCount: 0
        };

        const level = {
            startX: 400,
            startY: 550,
            endX: 400,
            endY: 50,
            endRadius: 40,
            obstacles: [
                { x: 200, y: 200, radius: 30 },
                { x: 400, y: 300, radius: 30 },
                { x: 600, y: 200, radius: 30 }
            ]
        };

        const gameState = {
            finished: false,
            gameOver: false
        };

        const pufferfish = {
            x: 400,
            y: 550,
            radius: 20,
            vx: 0,
            vy: 0,
            scale: 1.0,
            inflateTime: 0,
            maxInflateTime: 1.0,
            deflateSpeed: 3.0,
            launchVelocity: 900,
            friction: 0.992,
            rotation: -Math.PI / 2,
            rotationSpeed: 6,
            hp: 100,
            maxHp: 100,
            invincibleTime: 0,
            waveOffset: 0,           // 波浪抖动偏移
            waveAmplitude: 0         // 波浪振幅
        };

        const input = {
            mouseDown: false,
            mouseX: 0,
            mouseY: 0,
            clickingFish: false,
            clickReleased: false,
            clickPressedLastFrame: false
        };

        // 鼠标事件
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            input.mouseX = e.clientX - rect.left;
            input.mouseY = e.clientY - rect.top;
            input.mouseDown = true;
            
            const dx = input.mouseX - pufferfish.x;
            const dy = input.mouseY - pufferfish.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const fishRadius = pufferfish.radius * pufferfish.scale * 1.5;
            
            if (dist < fishRadius) {
                input.clickingFish = true;
            }
            
            if (gameState.finished || gameState.gameOver) {
                initLevel();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            input.mouseDown = false;
            input.clickingFish = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            input.mouseX = e.clientX - rect.left;
            input.mouseY = e.clientY - rect.top;
        });

        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            input.mouseX = touch.clientX - rect.left;
            input.mouseY = touch.clientY - rect.top;
            input.mouseDown = true;
            
            const dx = input.mouseX - pufferfish.x;
            const dy = input.mouseY - pufferfish.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const fishRadius = pufferfish.radius * pufferfish.scale * 1.5;
            
            if (dist < fishRadius) {
                input.clickingFish = true;
            }
            
            if (gameState.finished || gameState.gameOver) {
                initLevel();
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            input.mouseX = touch.clientX - rect.left;
            input.mouseY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            input.mouseDown = false;
            input.clickingFish = false;
        });

        function initLevel() {
            pufferfish.x = level.startX;
            pufferfish.y = level.startY;
            pufferfish.vx = 0;
            pufferfish.vy = 0;
            pufferfish.scale = 1.0;
            pufferfish.inflateTime = 0;
            pufferfish.rotation = -Math.PI / 2;
            pufferfish.hp = pufferfish.maxHp;
            pufferfish.invincibleTime = 0;
            pufferfish.waveOffset = 0;
            pufferfish.waveAmplitude = 0;
            
            gameState.finished = false;
            gameState.gameOver = false;
        }

        function checkCollisions() {
            const puffRadius = pufferfish.radius * pufferfish.scale;
            
            for (let obstacle of level.obstacles) {
                const dx = pufferfish.x - obstacle.x;
                const dy = pufferfish.y - obstacle.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const minDist = puffRadius + obstacle.radius;
                
                if (dist < minDist && pufferfish.invincibleTime <= 0) {
                    const damage = 10 + (pufferfish.scale - 1.0) * 40;
                    pufferfish.hp -= damage;
                    pufferfish.invincibleTime = 0.5;
                    
                    const overlap = minDist - dist;
                    const nx = dx / dist;
                    const ny = dy / dist;
                    
                    pufferfish.x += nx * overlap;
                    pufferfish.y += ny * overlap;
                    
                    const speed = Math.sqrt(pufferfish.vx * pufferfish.vx + pufferfish.vy * pufferfish.vy);
                    pufferfish.vx = nx * speed * 0.8;
                    pufferfish.vy = ny * speed * 0.8;
                    
                    onHit();
                    
                    if (pufferfish.hp <= 0) {
                        pufferfish.hp = 0;
                        gameState.gameOver = true;
                    }
                    
                    return;
                }
            }
        }

        function checkEndZone() {
            const dx = pufferfish.x - level.endX;
            const dy = pufferfish.y - level.endY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < level.endRadius) {
                gameState.finished = true;
                // 停下所有运动
                pufferfish.vx = 0;
                pufferfish.vy = 0;
                pufferfish.scale = 1.0;
                pufferfish.waveAmplitude = 0;
                onFinish();
            }
        }

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, duration, type = 'sine') {
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = frequency;
                osc.type = type;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + duration);
            } catch (e) {}
        }

        function onLaunch() {
            playSound(400, 0.1);
        }

        function onHit() {
            playSound(150, 0.3, 'square');
        }

        function onFinish() {
            playSound(800, 0.3);
        }

        function gameLoop() {
            const now = Date.now();
            game.deltaTime = (now - game.lastTime) / 1000;
            game.lastTime = now;
            
            game.frameCount++;
            if (game.frameCount % 10 === 0) {
                game.fps = Math.round(1 / game.deltaTime);
                document.getElementById('fps').textContent = game.fps;
            }
            
            update(game.deltaTime);
            
            if (!gameState.finished && !gameState.gameOver) {
                checkCollisions();
                checkEndZone();
            }
            
            render();
            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            // 更新无敌时间
            if (pufferfish.invincibleTime > 0) {
                pufferfish.invincibleTime -= dt;
            }
            
            // 检测点击释放
            const clickReleased = input.clickPressedLastFrame && !input.clickingFish;
            input.clickPressedLastFrame = input.clickingFish;
            
            // 膨胀逻辑
            if (input.clickingFish) {
                pufferfish.inflateTime = Math.min(
                    pufferfish.inflateTime + dt,
                    pufferfish.maxInflateTime
                );
                pufferfish.rotation += pufferfish.rotationSpeed * dt;
            } else {
                pufferfish.inflateTime = Math.max(
                    pufferfish.inflateTime - dt * pufferfish.deflateSpeed,
                    0
                );
            }
            
            // 缩放：膨胀时变大，弹射后渐进变小
            const targetScale = 1.0 + (pufferfish.inflateTime / pufferfish.maxInflateTime) * 0.5;
            pufferfish.scale = pufferfish.scale * 0.9 + targetScale * 0.1;
            
            // 松手弹射
            if (clickReleased && pufferfish.inflateTime > 0.2) {
                const launchPower = pufferfish.inflateTime / pufferfish.maxInflateTime;
                const tailDirection = pufferfish.rotation + Math.PI;
                pufferfish.vx = Math.cos(tailDirection) * pufferfish.launchVelocity * launchPower;
                pufferfish.vy = Math.sin(tailDirection) * pufferfish.launchVelocity * launchPower;
                
                // 设置波浪抖动振幅（速度越快，抖动越大）
                pufferfish.waveAmplitude = launchPower * 8;
                
                pufferfish.inflateTime = 0;
                onLaunch();
            }
            
            // 波浪抖动（弹射时）
            if (pufferfish.waveAmplitude > 0) {
                pufferfish.waveOffset += dt * 15;  // 波浪频率
                const wave = Math.sin(pufferfish.waveOffset) * pufferfish.waveAmplitude;
                // 垂直于运动方向的抖动
                const speed = Math.sqrt(pufferfish.vx * pufferfish.vx + pufferfish.vy * pufferfish.vy);
                if (speed > 10) {
                    const perpX = -pufferfish.vy / speed;
                    const perpY = pufferfish.vx / speed;
                    pufferfish.x += perpX * wave * dt;
                    pufferfish.y += perpY * wave * dt;
                }
                // 波浪振幅逐渐减小
                pufferfish.waveAmplitude *= 0.95;
                if (pufferfish.waveAmplitude < 0.5) {
                    pufferfish.waveAmplitude = 0;
                }
            }
            
            // 水的阻力
            pufferfish.vx *= pufferfish.friction;
            pufferfish.vy *= pufferfish.friction;
            
            // 速度太慢时归零
            const currentSpeed = Math.sqrt(pufferfish.vx * pufferfish.vx + pufferfish.vy * pufferfish.vy);
            if (currentSpeed < 5) {
                pufferfish.vx = 0;
                pufferfish.vy = 0;
            }
            
            pufferfish.x += pufferfish.vx * dt;
            pufferfish.y += pufferfish.vy * dt;
            
            // 边界碰撞
            const margin = pufferfish.radius * pufferfish.scale;
            
            if (pufferfish.x - margin < 0) {
                pufferfish.x = margin;
                pufferfish.vx = Math.abs(pufferfish.vx) * 0.8;
            } else if (pufferfish.x + margin > canvas.width) {
                pufferfish.x = canvas.width - margin;
                pufferfish.vx = -Math.abs(pufferfish.vx) * 0.8;
            }
            
            if (pufferfish.y - margin < 0) {
                pufferfish.y = margin;
                pufferfish.vy = Math.abs(pufferfish.vy) * 0.8;
            } else if (pufferfish.y + margin > canvas.height) {
                pufferfish.y = canvas.height - margin;
                pufferfish.vy = -Math.abs(pufferfish.vy) * 0.8;
            }
            
            // 更新 HP 显示
            document.getElementById('hp').textContent = Math.round(pufferfish.hp);
            document.getElementById('hp-fill').style.width = (pufferfish.hp / pufferfish.maxHp * 100) + '%';
            document.getElementById('hp-fill').style.background = pufferfish.hp > 30 ? '#0f0' : '#f00';
        }

        function render() {
            ctx.fillStyle = '#001030';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制起点
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(level.startX, level.startY, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('START', level.startX, level.startY + 25);
            
            // 绘制终点
            ctx.fillStyle = '#0088ff';
            ctx.beginPath();
            ctx.arc(level.endX, level.endY, level.endRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.fillText('END', level.endX, level.endY + level.endRadius + 15);
            
            // 绘制障碍物
            ctx.fillStyle = '#ff0000';
            for (let obstacle of level.obstacles) {
                ctx.beginPath();
                ctx.arc(obstacle.x, obstacle.y, obstacle.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 绘制河豚
            ctx.save();
            ctx.translate(pufferfish.x, pufferfish.y);
            ctx.rotate(pufferfish.rotation);
            
            const radius = pufferfish.radius * pufferfish.scale;
            
            // 无敌时闪烁
            if (pufferfish.invincibleTime > 0 && Math.floor(pufferfish.invincibleTime * 10) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }
            
            // 根据状态判断颜色
            if (pufferfish.hp <= 0) {
                ctx.fillStyle = '#888';
            } else if (input.clickingFish && pufferfish.inflateTime > 0) {
                ctx.fillStyle = '#ffff00';
            } else if (Math.abs(pufferfish.vx) > 10 || Math.abs(pufferfish.vy) > 10) {
                ctx.fillStyle = '#ff6600';
            } else {
                ctx.fillStyle = '#00ff00';
            }
            
            // 绘制身体（椭圆）
            ctx.beginPath();
            ctx.ellipse(0, 0, radius * 1.3, radius, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制尾巴
            ctx.beginPath();
            ctx.moveTo(-radius * 0.8, 0);
            ctx.lineTo(-radius * 1.8, -radius * 0.5);
            ctx.lineTo(-radius * 1.8, radius * 0.5);
            ctx.closePath();
            ctx.fill();
            
            // 绘制眼睛
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(radius * 0.6, -radius * 0.3, radius * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(radius * 0.7, -radius * 0.3, radius * 0.12, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制方向指示器
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(radius * 0.8, 0);
            ctx.lineTo(radius * 1.5, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(radius * 1.5, 0);
            ctx.lineTo(radius * 1.2, -radius * 0.3);
            ctx.moveTo(radius * 1.5, 0);
            ctx.lineTo(radius * 1.2, radius * 0.3);
            ctx.stroke();
            
            ctx.restore();
            
            // 绘制膨胀进度条
            if (input.clickingFish && pufferfish.inflateTime > 0) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(pufferfish.x - 50, pufferfish.y + radius * 2.5, 100, 10);
                ctx.fillStyle = '#ffff00';
                const progress = pufferfish.inflateTime / pufferfish.maxInflateTime;
                ctx.fillRect(pufferfish.x - 50, pufferfish.y + radius * 2.5, 100 * progress, 10);
            }
            
            // 绘制状态文本
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            
            if (gameState.finished) {
                ctx.fillStyle = '#00ff00';
                ctx.fillText('🎉 过关！', canvas.width / 2, canvas.height / 2);
                ctx.font = '16px Arial';
                ctx.fillStyle = '#fff';
                ctx.fillText('点击重新开始', canvas.width / 2, canvas.height / 2 + 40);
            } else if (gameState.gameOver) {
                ctx.fillStyle = '#ff0000';
                ctx.fillText('💀 游戏结束', canvas.width / 2, canvas.height / 2);
                ctx.font = '16px Arial';
                ctx.fillStyle = '#fff';
                ctx.fillText('点击重新开始', canvas.width / 2, canvas.height / 2 + 40);
            }
            
            // 绘制边界
            ctx.strokeStyle = '#0af';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        initLevel();
        gameLoop();
    </script>
</body>
</html>
